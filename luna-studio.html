<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Luna Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital@1&family=Fraunces:opsz,wght@9..144,100&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="luna-studio.css" />
</head>
<body>

<div class="ls-wrap">
<div class="ls-frame">

  <!-- ═══ 状态栏（完整复刻 chatroom） ═══ -->
  <div class="status-bar">
    <div class="status-time" id="lsTime">9:41</div>
    <div class="status-island" id="statusIsland"></div>
    <div class="status-right">
      <div class="signal">
        <i></i><i></i><i></i><i></i>
      </div>
      <div class="battery">
        <span class="bat-pct" id="lsBatPct">76</span>
        <div class="bat-shell">
          <div class="bat-inner" id="lsBatInner"></div>
          <div class="bat-nub"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ 头部 ═══ -->
  <div class="ls-header">

    <svg class="ls-header-bg" viewBox="0 0 1440 160" preserveAspectRatio="xMidYMid slice" fill="none">
      <circle cx="1300" cy="20" r="200" stroke="rgba(0,0,0,0.025)" stroke-width="1"/>
      <circle cx="1300" cy="20" r="300" stroke="rgba(0,0,0,0.018)" stroke-width=".8"/>
      <circle cx="40"  cy="22" r="1.2" fill="rgba(0,0,0,0.055)"/>
      <circle cx="88"  cy="14" r=".8"  fill="rgba(0,0,0,0.04)"/>
      <circle cx="200" cy="30" r="1"   fill="rgba(0,0,0,0.05)"/>
      <circle cx="55"  cy="55" r=".7"  fill="rgba(0,0,0,0.035)"/>
      <circle cx="400" cy="18" r="1.3" fill="rgba(0,0,0,0.05)"/>
      <circle cx="280" cy="48" r=".9"  fill="rgba(0,0,0,0.035)"/>
      <line x1="24" y1="108" x2="600" y2="108" stroke="rgba(0,0,0,0.05)" stroke-width=".5" stroke-dasharray="3 5"/>
    </svg>

    <div class="ls-header-main">
      <!-- 头像区 -->
      <div class="ls-avatar-wrap">
        <div class="ls-pulse-ring"></div>
        <div class="ls-orbit-ring"></div>
        <div class="ls-avatar" id="lsAvatarEl">
          <div class="ls-avatar-inner" id="lsAvatarInner">L</div>
        </div>
        <div class="ls-online-dot"></div>
      </div>

      <!-- 名称信息 -->
      <div class="ls-info">
        <div class="ls-name-row">
          <span class="ls-name">Luna Studio</span>
          <svg class="ls-moon" width="18" height="18" viewBox="0 0 24 24">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" fill="#888"/>
          </svg>
          <div class="ls-badge">
            <svg width="8" height="8" viewBox="0 0 10 10">
              <circle cx="5" cy="5" r="4" fill="none" stroke="#888" stroke-width="1"/>
              <path d="M3 5l1.5 1.5L7 3.5" stroke="#888" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            </svg>
            <span>AI</span>
          </div>
        </div>
        <p class="ls-sub">为你创作，与你同在</p>
        <div class="ls-status-pill">
          <div class="ls-status-dot"></div>
          <span>创作中枢</span>
        </div>
      </div>

      <!-- 右侧操作 -->
      <div class="ls-actions">
        <button class="ls-action-btn" id="lsBackBtn" title="返回">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M19 12H5M12 5l-7 7 7 7" stroke="rgba(60,60,60,0.7)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="ls-action-btn" id="lsHistoryBtn" title="历史">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="9" stroke="rgba(60,60,60,0.7)" stroke-width="1.5"/>
            <path d="M12 7v5l3 3" stroke="rgba(60,60,60,0.7)" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- 统计行 -->
    <div class="ls-stats">
      <div class="ls-stat">
        <div class="ls-stat-val" id="lsStatCount">0</div>
        <div class="ls-stat-lbl">创作</div>
      </div>
      <div class="ls-stat">
        <div class="ls-stat-val" id="lsStatTypes">8</div>
        <div class="ls-stat-lbl">类型</div>
      </div>
      <div class="ls-stat">
        <div class="ls-stat-val">
          <svg width="14" height="14" viewBox="0 0 24 24">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" fill="#aaa"/>
          </svg>
        </div>
        <div class="ls-stat-lbl">Luna</div>
      </div>
    </div>

    <!-- 标签栏 -->
    <div class="ls-tabs">
      <div class="ls-tab ls-tab-on" id="lsTab0" onclick="lsGoTab('create')">创作</div>
      <div class="ls-tab" id="lsTab1" onclick="lsGoTab('result')">预览</div>
      <div class="ls-tab" id="lsTab2" onclick="lsGoTab('history')">记录</div>
    </div>

  </div>

  <!-- ═══ 主体 ═══ -->
  <div class="ls-body">

    <!-- ── 创作面板 ── -->
    <div class="ls-pane ls-pane-active" id="lsPaneCreate">
      <div class="ls-create-scroll">

        <div class="ls-section-lbl">选择内容类型</div>
        <div class="ls-type-grid" id="lsTypeGrid"></div>

        <div class="ls-section-lbl">告诉 Luna 你想要什么</div>
        <div class="ls-textarea-wrap">
          <textarea class="ls-prompt-box" id="lsPromptBox" rows="3"
            placeholder="随便说说：今天心情很乱，想让 Luna 帮我整理一下…"></textarea>
          <div class="ls-prompt-hint" id="lsPromptHint">Luna 会以她的视角和口吻为你生成专属内容</div>
        </div>

        <div class="ls-section-lbl">风格偏好 <span class="ls-section-hint">可自由描述，留空则由 Luna 自由发挥</span></div>
        <div class="ls-textarea-wrap">
          <textarea class="ls-prompt-box ls-style-box" id="lsStyleBox" rows="2"
            placeholder="如：温柔细腻、带点忧郁；或极简冷淡、不带多余情感；随意写…"></textarea>
        </div>

        <div class="ls-section-lbl">内容深度 <span class="ls-section-hint">告诉 Luna 你想要多详细</span></div>
        <div class="ls-textarea-wrap">
          <textarea class="ls-prompt-box ls-depth-box" id="lsDepthBox" rows="2"
            placeholder="如：越详细越好，至少 800 字；或：简短精炼，150 字就够；随意写…"></textarea>
        </div>

        <!-- 装饰分割线（复刻 chatroom 输入区分割线风格） -->
        <div class="ls-divider">
          <div class="ls-divider-line"></div>
          <svg width="48" height="10" viewBox="0 0 48 10">
            <circle cx="5"  cy="5" r="1.5" fill="#c8c8c8"/>
            <line x1="7"   y1="5" x2="11"  y2="5" stroke="#c8c8c8" stroke-width=".5" opacity=".4"/>
            <circle cx="24" cy="5" r="2.2" fill="#c8c8c8"/>
            <path d="M24 2l.6 2H27l-1.8 1.3.7 2.1L24 6.1l-1.9 1.2.7-2.1L21 4H23.4L24 2Z" fill="rgba(0,0,0,0.15)"/>
            <line x1="26.5" y1="5" x2="37"  y2="5" stroke="#c8c8c8" stroke-width=".5" opacity=".4"/>
            <circle cx="43" cy="5" r="1.5" fill="#c8c8c8"/>
          </svg>
          <div class="ls-divider-line"></div>
        </div>

        <button class="ls-gen-btn" id="lsGenBtn" disabled onclick="lsDoGenerate()">
          <svg class="ls-gen-ring" width="52" height="52" viewBox="0 0 52 52">
            <circle cx="26" cy="26" r="23" fill="none"
              stroke="rgba(255,255,255,0.25)" stroke-width=".8" stroke-dasharray="6 5"
              style="animation:spin-dash 6s linear infinite;transform-origin:26px 26px;"/>
          </svg>
          <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
            <path d="M10 1L11.8 7H18L12.9 10.7L14.7 16.7L10 13L5.3 16.7L7.1 10.7L2 7H8.2L10 1Z"
              stroke="rgba(255,255,255,0.9)" stroke-width="1.3" stroke-linejoin="round" fill="rgba(255,255,255,0.1)"/>
          </svg>
          让 Luna 为你创作
        </button>

      </div>
    </div>

    <!-- ── 预览面板 ── -->
    <div class="ls-pane" id="lsPaneResult">
      <div class="ls-result-bar">
        <div class="ls-result-bar-l">
          <div class="ls-rdot" id="lsRdot"></div>
          <div class="ls-rtitle" id="lsRtitle">等待创作</div>
        </div>
        <div class="ls-result-bar-r">
          <button class="ls-rbar-btn" onclick="lsGoTab('create')">返回编辑</button>
          <button class="ls-rbar-btn" id="lsRegenBtn" style="display:none" onclick="lsDoGenerate()">重新生成</button>
        </div>
      </div>
      <div class="ls-render-wrap" id="lsRenderWrap">
        <!-- 空状态 -->
        <div class="ls-empty" id="lsEmpty">
          <div class="ls-empty-line"></div>
          <div class="ls-empty-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" opacity=".3">
              <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" fill="#1a1a1a"/>
            </svg>
          </div>
          <div class="ls-empty-txt">舞台空空</div>
          <div class="ls-empty-sub">先在创作标签页选好内容类型</div>
          <div class="ls-empty-line"></div>
        </div>

        <!-- 加载状态 -->
        <div class="ls-loading" id="lsLoading" style="display:none">
          <div class="ls-loading-rings">
            <div class="ls-lr1"></div>
            <div class="ls-lr2"></div>
            <div class="ls-lr-dot">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
                <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" fill="#9a9794"/>
              </svg>
            </div>
          </div>
          <div class="ls-ltxt" id="lsLtxt">Luna 正在创作...</div>
          <div class="ls-lstep" id="lsLstep">连接中</div>
        </div>

        <!-- 渲染输出（直接注入，不用 iframe） -->
        <div class="ls-rendered" id="lsRendered"></div>
      </div>
    </div>

    <!-- ── 历史记录面板 ── -->
    <div class="ls-pane" id="lsPaneHistory">
      <div class="ls-history-wrap" id="lsHistoryWrap">
        <div class="ls-empty" id="lsHistoryEmpty" style="display:none">
          <div class="ls-empty-line"></div>
          <div class="ls-empty-txt">暂无记录</div>
          <div class="ls-empty-sub">创作完成后会自动保存到这里</div>
          <div class="ls-empty-line"></div>
        </div>
        <div id="lsHistoryList"></div>
      </div>
    </div>

  </div>

</div>
</div>

<script src="luna-studio.js"></script>
</body>
</html>
