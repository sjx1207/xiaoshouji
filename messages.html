<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Messages</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="messages.css" />
</head>
<body>

<div class="msg-wrap">
  <div class="msg-frame">

    <!-- 背景层 -->
    <div class="msg-bg-glow"></div>

    <!-- ===================== 状态栏（复刻 index 页面） ===================== -->
    <div class="status-bar">
      <div class="status-time" id="statusTime">9:41</div>
      <div class="status-island" id="statusIsland"></div>
      <div class="status-right">
        <div class="signal">
          <i></i><i></i><i></i><i></i>
        </div>
        <div class="battery">
          <span class="bat-pct" id="batPct">76</span>
          <div class="bat-shell">
            <div class="bat-inner" id="batInner"></div>
            <div class="bat-nub"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ===================== 主视图：会话列表 ===================== -->
    <div class="msg-view" id="viewList">

      <!-- 顶部导航：标题 + 账户区 -->
      <div class="msg-topbar">
        <div class="topbar-row-1">
          <button class="icon-btn edit-btn" id="btnEdit" aria-label="发短信">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 20h4l10-10-4-4L4 16v4z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
          </button>

          <div class="account-chip" id="accountChip">
            <div class="account-avatar" id="topbarAvatar">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="8" r="4" stroke="#f4f4f6" stroke-width="1.6"/>
                <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="#f4f4f6" stroke-width="1.6" stroke-linecap="round"/>
              </svg>
            </div>
            <div class="account-meta">
              <span class="account-name" id="accountNameDisplay">Serene Han</span>
              <span class="account-sub" id="accountSubDisplay">在线 · iCloud 已同步</span>
            </div>
            <svg class="chip-caret" width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>

          <button class="icon-btn compose-mini" id="btnComposeMini" aria-label="返回">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
          </button>
        </div>

        <div class="topbar-row-2">
          <h1 class="msg-title">信息</h1>
        </div>
        <div class="msg-subtitle" id="msgSubtitle">
          <span class="subtitle-dot"></span>
          <span id="msgSubtitleText">加载中…</span>
        </div>

        <!-- 搜索栏 -->
        <div class="search-bar">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8"/><path d="M21 21l-4.3-4.3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          <span class="search-placeholder">搜索</span>
        </div>

        <!-- 分类筛选：全部 / 未读 / 好友 / 陌生人 / 系统 -->
        <div class="filter-row" id="filterRow">
          <button class="filter-chip is-active" data-filter="all">全部</button>
          <button class="filter-chip" data-filter="unread">
            未读 <span class="chip-count" id="countUnread">0</span>
          </button>
          <button class="filter-chip" data-filter="friends">好友</button>
          <button class="filter-chip" data-filter="strangers">陌生人</button>
          <button class="filter-chip" data-filter="system">系统</button>
        </div>
      </div>

      <!-- 会话列表 -->
      <div class="thread-scroll" id="threadScroll">

        <!-- 分组：好友（内容由角色库动态同步生成） -->
        <div class="section-label" id="friendsSectionLabel">好友</div>
        <div class="thread-container" id="friendsThreadContainer" data-cat="friends">
          <!-- 由 messages.js 根据 LunaCharDB 中的角色动态渲染 -->
        </div>

        <!-- 分组：陌生人（无真实数据时显示带图标的空状态卡片） -->
        <div class="section-label" id="strangersSectionLabel">陌生人</div>
        <div class="thread-container" id="strangersThreadContainer" data-cat="strangers">
          <!-- 由 messages.js 渲染真实的陌生人消息，暂无数据时显示空状态卡片 -->
        </div>

        <!-- 分组：系统（无真实数据时显示带图标的空状态卡片） -->
        <div class="section-label" id="systemSectionLabel">系统</div>
        <div class="thread-container" id="systemThreadContainer" data-cat="system">
          <!-- 由 messages.js 渲染真实的系统通知，暂无数据时显示空状态卡片 -->
        </div>

        <div class="list-bottom-space"></div>
      </div>

      <!-- 悬浮发送新短信按钮 -->
      <button class="fab-compose" id="fabCompose" aria-label="发短信">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="#0c0c0e" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>

    <!-- ===================== 聊天详情页（仿 iMessage · 黑白灰韩系高级风） ===================== -->
    <div class="msg-view thread-detail" id="viewThread">

      <!-- 详情页顶部导航 -->
      <div class="td-topbar">
        <button class="td-back" id="btnThreadBack" aria-label="返回">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M15 6l-7 6 7 6" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="td-back-count" id="threadBackCount"></span>
        </button>

        <div class="td-identity" id="threadIdentity">
          <div class="td-avatar-ring">
            <div class="td-avatar" id="threadAvatar"></div>
          </div>
          <div class="td-name-row">
            <span class="td-name" id="threadName">—</span>
            <svg class="td-name-caret" width="9" height="9" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </div>

        <button class="td-info-btn" id="btnThreadInfo" aria-label="详情">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9.2" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="12" r="9.2" stroke="currentColor" stroke-width="1.5" stroke-dasharray="1 7" stroke-linecap="round" transform="rotate(-90 12 12)"/></svg>
        </button>
      </div>

      <!-- 消息滚动区 -->
      <div class="td-scroll" id="threadMsgScroll">
        <div class="td-thread-meta" id="threadMetaLabel">
          <span class="td-meta-line"></span>
          <span class="td-meta-text">对话已加密 · 由 Luna 同步</span>
          <span class="td-meta-line"></span>
        </div>

        <div class="td-messages" id="threadMessages">
          <!-- 由 messages.js 动态渲染消息气泡 -->
        </div>

        <div class="td-empty-state" id="threadEmptyState">
          <div class="td-empty-ring">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <span>还没有消息记录<br>发送第一条消息，开始这段对话</span>
        </div>
      </div>

      <!-- 底部输入区：输入框 + AI 回复按钮（占位） + 发送按钮 -->
      <div class="td-input-bar">
        <button class="td-plus-btn" id="btnThreadAttach" aria-label="添加">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/></svg>
        </button>

        <div class="td-field">
          <textarea class="td-field-input" id="threadInputField" placeholder="信息" rows="1"></textarea>
        </div>

        <!-- AI 回复按钮：占位样式，供后续接入自动/智能回复功能 -->
        <button class="td-ai-btn" id="btnThreadAI" aria-label="AI 回复" data-tip="AI 回复">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M12 3l1.6 4.2L18 8.8l-4.4 1.6L12 14.6l-1.6-4.2L6 8.8l4.4-1.6L12 3z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
            <path d="M18.5 14.5l.8 2 2 .8-2 .8-.8 2-.8-2-2-.8 2-.8.8-2z" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round"/>
          </svg>
        </button>

        <button class="td-send-btn" id="btnThreadSend" disabled aria-label="发送">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 19V5M5 12l7-7 7 7" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>

    <!-- ===================== 系统通知详情页（与角色聊天页区分：无输入框，卡片式说明） ===================== -->
    <div class="msg-view sys-detail" id="viewSystemDetail">

      <div class="sd-topbar">
        <button class="sd-back" id="btnSysBack" aria-label="返回">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M15 6l-7 6 7 6" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <span class="sd-topbar-title">通知详情</span>
        <span class="sd-topbar-spacer"></span>
      </div>

      <div class="sd-scroll">
        <div class="sd-card">
          <div class="sd-card-icon" id="sdCardIcon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="4" y="4" width="16" height="16" rx="4"/><path d="M12 8v5" stroke-linecap="round"/><circle cx="12" cy="16" r="0.8" fill="currentColor" stroke="none"/></svg>
          </div>
          <div class="sd-card-app" id="sdCardApp">系统</div>
          <div class="sd-card-title" id="sdCardTitle">—</div>
          <div class="sd-card-divider"></div>
          <div class="sd-card-message" id="sdCardMessage">—</div>
          <div class="sd-card-time" id="sdCardTime">—</div>
        </div>

        <div class="sd-hint">
          <span class="td-meta-line"></span>
          <span class="sd-hint-text">此消息由系统自动生成，不支持回复</span>
          <span class="td-meta-line"></span>
        </div>
      </div>
    </div>

    <!-- ===================== 账户面板（点击账户区弹出，仅用于切换登录身份） ===================== -->
    <div class="account-panel" id="accountPanel">
      <div class="account-panel-sheet">
        <div class="sheet-grip"></div>
        <div class="account-panel-head">
          <div class="account-avatar big" id="panelAvatarBig">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="#f4f4f6" stroke-width="1.6"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="#f4f4f6" stroke-width="1.6" stroke-linecap="round"/></svg>
          </div>
          <div>
            <div class="account-panel-name" id="panelNameDisplay">Serene Han</div>
            <div class="account-panel-id" id="panelIdDisplay">ID · 未同步</div>
          </div>
        </div>
        <div class="account-panel-list">
          <div class="identity-section-label">选择登录身份</div>
          <div class="identity-list" id="identityList">
            <!-- 由 messages.js 根据 LunaIdentityDB 中的身份动态渲染 -->
          </div>
          <button class="panel-manage-link" id="btnManageIdentity">管理全部身份 →</button>
        </div>
        <button class="panel-close" id="btnCloseAccount">关闭</button>
      </div>
      <div class="account-panel-scrim" id="accountScrim"></div>
    </div>

    <!-- ===================== 新建信息面板 ===================== -->
    <div class="compose-panel" id="composePanel">
      <div class="compose-head">
        <button class="compose-cancel" id="btnComposeCancel">取消</button>
        <span class="compose-title">新建信息</span>
        <span class="compose-head-spacer"></span>
      </div>
      <div class="compose-to-row">
        <span class="compose-to-label">收件人：</span>
        <input class="compose-to-input" id="composeToInput" type="text" placeholder="姓名或号码" />
      </div>
      <div class="compose-body-empty">
        <div class="empty-icon">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <span>输入收件人即可开始新的对话</span>
      </div>
      <div class="compose-input-bar">
        <div class="compose-field">
          <span class="compose-field-placeholder" id="composeFieldPh">信息</span>
        </div>
        <button class="send-btn" id="btnSend" disabled aria-label="发送">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 19V5M5 12l7-7 7 7" stroke="#0c0c0e" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>

  </div>
</div>

<script src="luna-banner.js"></script>
<script src="luna-system-messages.js"></script>
<script src="messages.js"></script>
</body>
</html>
