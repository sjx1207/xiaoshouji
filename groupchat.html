<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Group Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="groupchat.css" />
</head>
<body>

<div class="gc-wrap">
  <div class="gc-frame">

    <!-- Status bar -->
    <div class="status-bar">
      <div class="status-time" id="statusTime">9:41</div>
      <div class="status-island" id="statusIsland"></div>
      <div class="status-right">
        <div class="signal"><i></i><i></i><i></i><i></i></div>
        <div class="battery">
          <span class="bat-pct" id="batPct">76</span>
          <div class="bat-shell">
            <div class="bat-inner" id="batInner"></div>
            <div class="bat-nub"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Header -->
    <div class="gc-header">
      <div class="h-deco-top"></div>
      <div class="h-corner-deco2"></div>
      <div class="h-corner-deco"></div>
      <div class="h-inner">
        <div class="h-left" onclick="history.back()">
          <svg width="9" height="15" viewBox="0 0 9 16" fill="none" stroke="#bbb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="8,1 1,8 8,15"/></svg>
        </div>
        <div class="avatar-stack" id="avatarStack">
          <!-- populated by JS -->
        </div>
        <div class="group-info">
          <div class="g-name" id="gName">GROUP <span class="g-badge" id="gBadge">PRIVATE</span></div>
          <div class="g-sub" id="gSub">— MEMBERS</div>
        </div>
        <div class="h-actions">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="5" r="1" fill="#ccc"/><circle cx="12" cy="12" r="1" fill="#ccc"/><circle cx="12" cy="19" r="1" fill="#ccc"/></svg>
        </div>
      </div>
      <div class="h-deco-line"></div>
    </div>

    <!-- Message body -->
    <div class="gc-body" id="gcBody">

      <!-- Decorative lines -->
      <div class="deco-vline" style="left:44px;opacity:0.5"></div>
      <div class="deco-hline" style="top:90px;opacity:0.4"></div>
      <div class="deco-circle" style="width:80px;height:80px;top:-20px;right:-20px;opacity:0.35"></div>
      <div class="deco-circle" style="width:40px;height:40px;bottom:40px;left:10px;opacity:0.25"></div>
      <div class="deco-cross" style="top:34px;right:22px;opacity:0.6"></div>
      <div class="deco-cross" style="bottom:60px;left:58px;opacity:0.4"></div>
      <div class="deco-bracket-r" style="top:62px;right:14px;"></div>
      <div class="deco-bracket-l" style="bottom:90px;left:14px;"></div>

      <!-- Date row -->
      <div class="date-row">
        <div class="date-line"></div>
        <div class="date-chip" id="gcDateChip">— — —</div>
        <div class="date-line r"></div>
      </div>

      <!-- Encryption notice -->
      <div class="notice">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.8" stroke-linecap="round" style="flex-shrink:0"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9,12 11,14 15,10"/></svg>
        <span class="notice-text">END-TO-END ENCRYPTED</span>
      </div>

      <!-- Message list -->
      <div id="msgList"></div>

      <!-- Typing indicator -->
      <div class="typing-row" id="typingRow" style="display:none;">
        <div class="mini-av" id="typingAvatar">SY</div>
        <div class="typing-bub">
          <div class="td" id="td1"></div>
          <div class="td" id="td2"></div>
          <div class="td" id="td3"></div>
        </div>
        <span style="font-size:9.5px;color:#ccc;letter-spacing:1px;margin-left:2px;font-family:'DM Mono',monospace;text-transform:uppercase" id="typingName">TYPING</span>
      </div>

    </div>

    <!-- Input area -->
    <div class="input-wrap">
      <div class="input-deco-top"></div>
      <div class="input-row">
        <button class="fn-btn" id="fnBtn" onclick="toggleFnPanel()" aria-label="More">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="1" fill="currentColor"/>
            <circle cx="5" cy="12" r="1" fill="currentColor"/>
            <circle cx="19" cy="12" r="1" fill="currentColor"/>
          </svg>
        </button>
        <input
          class="input-field"
          id="inputField"
          type="text"
          placeholder="MESSAGE..."
          oninput="onInputChange(this)"
          onkeydown="onInputKeydown(event)"
          autocomplete="off"
        />
        <div class="input-icons">
          <div class="ai-restore-btn" id="aiRestoreBtn" onclick="fnAiRestore()" aria-label="AI Restore">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#d0d0d0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 12a9 9 0 1 0 3-6.7"/>
              <polyline points="3,4 3,9 8,9"/>
              <path d="M12 8v4l3 2" stroke-width="1.6"/>
            </svg>
          </div>
        </div>
        <div class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#eee" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5,12 12,5 19,12"/></svg>
        </div>
      </div>

      <!-- Function panel -->
      <div class="fn-panel" id="fnPanel">
        <div class="fn-panel-inner">
          <div class="fn-item" onclick="fnSendImage()">
            <div class="fn-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor" stroke="none"/><polyline points="21,15 16,10 5,21"/></svg>
            </div>
            <span class="fn-label">PHOTO</span>
          </div>
          <div class="fn-item" onclick="fnSendVoice()">
            <div class="fn-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
            </div>
            <span class="fn-label">VOICE</span>
          </div>
          <div class="fn-item" onclick="fnVoiceCall()">
            <div class="fn-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.362 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            </div>
            <span class="fn-label">VOICE CALL</span>
          </div>
          <div class="fn-item" onclick="fnVideoCall()">
            <div class="fn-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="23,7 16,12 23,17"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
            </div>
            <span class="fn-label">VIDEO CALL</span>
          </div>
          <div class="fn-item" onclick="fnTransfer()">
            <div class="fn-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="13" rx="2"/><path d="M2 10h20"/><circle cx="7" cy="14.5" r="1" fill="currentColor" stroke="none"/></svg>
            </div>
            <span class="fn-label">TRANSFER</span>
          </div>
          <div class="fn-item" onclick="fnRedPacket()">
            <div class="fn-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="12" cy="12" r="3.4"/><path d="M12 3v3.2M12 17.8V21"/></svg>
            </div>
            <span class="fn-label">RED PACKET</span>
          </div>
          <div class="fn-item" onclick="fnSticker()">
            <div class="fn-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="9" y1="10" x2="9" y2="10.5"/><line x1="15" y1="10" x2="15" y2="10.5"/><path d="M8 15s1.5 2 4 2 4-2 4-2"/></svg>
            </div>
            <span class="fn-label">STICKER</span>
          </div>
          <div class="fn-item" onclick="fnGroupInteract()">
            <div class="fn-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            </div>
            <span class="fn-label">GROUP</span>
          </div>
        </div>
      </div>

    </div>

  </div>
</div>

<div class="gc-toast" id="gcToast"></div>

<script src="groupchat.js"></script>
</body>
</html>
