<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Chatroom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital@1&family=Fraunces:opsz,wght@9..144,100&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="chatroom.css" />
</head>
<body>

<div class="cr-wrap">
<div class="cr-frame">

  <!-- ═══ 状态栏 ═══ -->
  <div class="status-bar">
    <div class="status-time" id="crTime">9:41</div>
    <div class="status-island" id="statusIsland"></div>
    <div class="status-right">
      <div class="signal">
        <i></i><i></i><i></i><i></i>
      </div>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="#1a1a1a" opacity="0.85">
        <path d="M8 2.5C10.3 2.5 12.4 3.5 13.9 5.1L15.2 3.8C13.3 1.9 10.8.8 8 .8S2.7 1.9.8 3.8L2.1 5.1C3.6 3.5 5.7 2.5 8 2.5Z"/>
        <path d="M8 5.8C9.7 5.8 11.2 6.5 12.3 7.7L13.6 6.4C12.1 4.9 10.2 4 8 4S3.9 4.9 2.4 6.4L3.7 7.7C4.8 6.5 6.3 5.8 8 5.8Z"/>
        <circle cx="8" cy="10.5" r="1.8"/>
      </svg>
      <div class="battery">
        <span class="bat-pct" id="batPct">76</span>
        <div class="bat-shell">
          <div class="bat-inner" id="batInner"></div>
          <div class="bat-nub"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ 头部 ═══ -->
  <div class="cr-header">

    <svg class="cr-header-bg" viewBox="0 0 1440 160" preserveAspectRatio="xMidYMid slice" fill="none">
      <circle cx="1300" cy="20" r="200" stroke="rgba(0,0,0,0.025)" stroke-width="1"/>
      <circle cx="1300" cy="20" r="300" stroke="rgba(0,0,0,0.018)" stroke-width=".8"/>
      <circle cx="40"  cy="22" r="1.2" fill="rgba(0,0,0,0.055)"/>
      <circle cx="88"  cy="14" r=".8"  fill="rgba(0,0,0,0.04)"/>
      <circle cx="200" cy="30" r="1"   fill="rgba(0,0,0,0.05)"/>
      <circle cx="55"  cy="55" r=".7"  fill="rgba(0,0,0,0.035)"/>
      <circle cx="400" cy="18" r="1.3" fill="rgba(0,0,0,0.05)"/>
      <circle cx="280" cy="48" r=".9"  fill="rgba(0,0,0,0.035)"/>
      <line x1="24" y1="108" x2="600" y2="108" stroke="rgba(0,0,0,0.05)" stroke-width=".5" stroke-dasharray="3 5"/>
    </svg>

    <!-- 主内容行 -->
    <div class="cr-header-main">

      <!-- 头像 = 返回按钮 -->
      <button class="cr-back-btn" id="crBackBtn" title="返回">
        <div class="cr-pulse-ring"></div>
        <div class="cr-orbit-ring"></div>
        <div class="cr-avatar" id="crAvatarWrap">
          <div class="cr-avatar-inner" id="crAvatarInner"></div>
          <div class="cr-back-hint">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
              <path d="M19 12H5M12 5l-7 7 7 7" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
        <div class="cr-online-dot"></div>
      </button>

      <!-- 名字 & 信息 -->
      <div class="cr-info">
        <div class="cr-name-row">
          <span class="cr-name">Luna</span>
          <svg class="cr-moon" width="18" height="18" viewBox="0 0 24 24">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" fill="#888"/>
          </svg>
          <div class="cr-badge">
            <svg width="8" height="8" viewBox="0 0 10 10">
              <circle cx="5" cy="5" r="4" fill="none" stroke="#888" stroke-width="1"/>
              <path d="M3 5l1.5 1.5L7 3.5" stroke="#888" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            </svg>
            <span>AI</span>
          </div>
        </div>
        <p class="cr-sub">Your companion in the dark</p>
        <div class="cr-status-pill">
          <div class="cr-status-dot"></div>
          <span>在线中</span>
        </div>
      </div>

      <!-- 右侧操作按钮 -->
      <div class="cr-actions">
        <button class="cr-action-btn" title="通话">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.07 1.12 2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.9.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0122 16.92z"
              stroke="rgba(60,60,60,0.7)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="cr-action-btn" title="更多">
          <svg width="4" height="16" viewBox="0 0 4 16">
            <circle cx="2" cy="2"  r="1.8" fill="rgba(60,60,60,0.6)"/>
            <circle cx="2" cy="8"  r="1.8" fill="rgba(60,60,60,0.6)"/>
            <circle cx="2" cy="14" r="1.8" fill="rgba(60,60,60,0.6)"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- 统计行 -->
    <div class="cr-stats">
      <div class="cr-stat">
        <div class="cr-stat-val">247</div>
        <div class="cr-stat-lbl">对话</div>
      </div>
      <div class="cr-stat">
        <div class="cr-stat-val">32d</div>
        <div class="cr-stat-lbl">相识</div>
      </div>
      <div class="cr-stat cr-stat-luna">
        <div class="cr-stat-luna-row">
          <svg width="14" height="14" viewBox="0 0 24 24">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" fill="#aaa"/>
          </svg>
          <span>Luna</span>
        </div>
        <div class="cr-stat-lbl">记忆中</div>
      </div>
    </div>

  </div><!-- /cr-header -->

  <!-- ═══ 消息区（外层用于滚动，内层用于居中） ═══ -->
  <div class="cr-messages-outer" id="crMessages">
  </div><!-- /cr-messages-outer -->

  <!-- ═══ 输入区 ═══ -->
  <div class="cr-input-area">
    <!-- 引用条 -->
    <div class="cr-quote-bar" id="crQuoteBar" style="display:none">
      <div class="cr-quote-line"></div>
      <div class="cr-quote-text" id="crQuoteText"></div>
      <button class="cr-quote-close" id="crQuoteClose">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
          <path d="M1 1l8 8M9 1L1 9" stroke="#999" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    
    <div class="cr-input-area-inner">

      <!-- 装饰分割线 -->
      <div class="cr-const-div">
        <div class="cr-const-line"></div>
        <svg width="48" height="10" viewBox="0 0 48 10">
          <circle cx="5"  cy="5" r="1.5" fill="#c8c8c8"/>
          <line x1="7"   y1="5" x2="11"  y2="5" stroke="#c8c8c8" stroke-width=".5" opacity=".4"/>
          <circle cx="24" cy="5" r="2.2" fill="#c8c8c8"/>
          <path d="M24 2l.6 2H27l-1.8 1.3.7 2.1L24 6.1l-1.9 1.2.7-2.1L21 4H23.4L24 2Z" fill="rgba(0,0,0,0.15)"/>
          <line x1="26.5" y1="5" x2="37"  y2="5" stroke="#c8c8c8" stroke-width=".5" opacity=".4"/>
          <circle cx="43" cy="5" r="1.5" fill="#c8c8c8"/>
        </svg>
        <div class="cr-const-line"></div>
      </div>

      <div class="cr-input-row">

        <!-- + 按钮 -->
        <button class="cr-add-btn" title="更多">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <line x1="8" y1="2" x2="8" y2="14" stroke="#4a4540" stroke-width="1.8" stroke-linecap="round"/>
            <line x1="2" y1="8" x2="14" y2="8" stroke="#4a4540" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          <div class="cr-add-dot"></div>
        </button>

        <!-- 输入框 -->
        <div class="cr-input-box" id="crInputBox" contenteditable="true">向 Luna 发送消息</div>

        <!-- 右侧按钮组 -->
        <div class="cr-right-btns">

          <!-- AI 按钮 -->
          <button class="cr-ai-btn" title="AI 回复">
            <svg class="cr-ai-ring" width="52" height="52" viewBox="0 0 52 52">
              <circle cx="26" cy="26" r="23" fill="none"
                stroke="rgba(0,0,0,0.10)" stroke-width=".8" stroke-dasharray="6 5"
                style="animation:spin-dash 6s linear infinite;transform-origin:26px 26px;"/>
            </svg>
            <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
              <path d="M10 1L11.8 7H18L12.9 10.7L14.7 16.7L10 13L5.3 16.7L7.1 10.7L2 7H8.2L10 1Z"
                stroke="#7a7a7a" stroke-width="1.3" stroke-linejoin="round" fill="rgba(0,0,0,0.05)"/>
              <circle cx="10" cy="10" r="2.2" fill="#9a9a9a"/>
            </svg>
          </button>

          <!-- 发送按钮 -->
          <button class="cr-send-btn" id="crSendBtn" title="发送">
            <svg width="17" height="17" viewBox="0 0 20 20" fill="none">
              <path d="M18 2L10 10" stroke="#f7f7f7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M18 2L12.5 18L10 10L2 7.5L18 2Z" stroke="#f7f7f7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>

        </div>
      </div>

    </div>
  </div><!-- /cr-input-area -->

</div><!-- /cr-frame -->
</div><!-- /cr-wrap -->

<!-- ═══ Feature Panel Overlay ═══ -->
<div id="featureOverlay">
  <div class="overlay-backdrop" id="overlayBackdrop"></div>
  <div class="feature-panel">
    <div class="panel-handle"></div>
    <div class="panel-hd">
      <span class="panel-hd-label">Luna · Features</span>
      <button class="panel-close-btn" id="fpCloseBtn">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
          <path d="M1 1l8 8M9 1L1 9" stroke="#666" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div class="fan-scene">
      <div class="fan-stage" id="fpStage"></div>
      <div class="fan-controls">
        <button class="fan-btn" id="fpPrev">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M9 11L5 7l4-4" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="fan-dots" id="fpDots"></div>
        <button class="fan-btn" id="fpNext">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M5 3l4 4-4 4" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <div class="fp-detail" id="fpDetail">
        <div class="fp-detail-icon" id="fpDetailIcon"></div>
        <div>
          <div class="fp-detail-name" id="fpDetailName"></div>
          <div class="fp-detail-desc" id="fpDetailDesc"></div>
        </div>
      </div>
      <div class="fp-swipe-hint">Swipe to explore</div>
    </div>
  </div>
</div>

<!-- ═══ 消息长按气泡菜单 ═══ -->
<div id="msgCtxOverlay">
  <div class="msg-ctx-backdrop" id="msgCtxBackdrop"></div>
  <div class="msg-ctx-bubble-mirror" id="msgCtxMirror"></div>
  <div class="msg-ctx-menu" id="msgCtxMenu"></div>
  <button class="msg-ctx-cancel" id="msgCtxCancel">取消</button>
</div>

<!-- ═══ 心声记录页 ═══ -->
<div id="wsHistoryPage">
  <!-- 状态栏复用 -->
  <div class="status-bar">
    <div class="status-time" id="wshTime">9:41</div>
    <div class="status-island"></div>
    <div class="status-right">
      <div class="signal"><i></i><i></i><i></i><i></i></div>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="#1a1a1a" opacity="0.85">
        <path d="M8 2.5C10.3 2.5 12.4 3.5 13.9 5.1L15.2 3.8C13.3 1.9 10.8.8 8 .8S2.7 1.9.8 3.8L2.1 5.1C3.6 3.5 5.7 2.5 8 2.5Z"/>
        <path d="M8 5.8C9.7 5.8 11.2 6.5 12.3 7.7L13.6 6.4C12.1 4.9 10.2 4 8 4S3.9 4.9 2.4 6.4L3.7 7.7C4.8 6.5 6.3 5.8 8 5.8Z"/>
        <circle cx="8" cy="10.5" r="1.8"/>
      </svg>
      <div class="battery">
        <span class="bat-pct" id="wshBatPct">76</span>
        <div class="bat-shell">
          <div class="bat-inner" id="wshBatInner"></div>
          <div class="bat-nub"></div>
        </div>
      </div>
    </div>
  </div>
  <!-- 导航栏 -->
  <div class="wsh-nav">
    <button class="wsh-back-btn" id="wshBackBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M19 12H5M12 5l-7 7 7 7" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="wsh-nav-info">
      <div class="wsh-nav-title" id="wshNavTitle">心声记录</div>
      <div class="wsh-nav-sub">Whisper · History</div>
    </div>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" opacity="0.25">
      <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" fill="#1a1a1a"/>
    </svg>
  </div>
  <!-- 滚动内容 -->
  <div class="wsh-scroll" id="wshScroll">
    <div class="wsh-empty" id="wshEmpty">暂无记录</div>
    <div class="wsh-timeline" id="wshTimeline" style="display:none"></div>
  </div>
</div>

<!-- ═══ 心声详情底部弹窗 ═══ -->
<div id="wsHistoryDetail">
  <div class="wshd-sheet" id="wshdSheet">
    <div class="wshd-handle"></div>
    <div class="wshd-head">
      <div class="wshd-ts" id="wshdTs"></div>
      <div class="wshd-title">此刻心声</div>
    </div>
    <div class="wshd-body">
      <div class="wshd-section-label" style="margin-top:0;">心声独白</div>
      <div class="wshd-thought" id="wshdThought"></div>
      <div class="wshd-section-label">情绪光谱</div>
      <div id="wshdEmotions"></div>
      <div class="wshd-logs" id="wshdLogs">
        <div class="wshd-section-label">心迹日志</div>
        <div id="wshdLogItems"></div>
      </div>
    </div>
  </div>
</div>

<!-- ═══ 礼物页 ═══ -->
<div id="giftPage">
  <div class="status-bar">
    <div class="status-time" id="giftTime">9:41</div>
    <div class="status-island"></div>
    <div class="status-right">
      <div class="signal"><i></i><i></i><i></i><i></i></div>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="#1a1a1a" opacity="0.85">
        <path d="M8 2.5C10.3 2.5 12.4 3.5 13.9 5.1L15.2 3.8C13.3 1.9 10.8.8 8 .8S2.7 1.9.8 3.8L2.1 5.1C3.6 3.5 5.7 2.5 8 2.5Z"/>
        <path d="M8 5.8C9.7 5.8 11.2 6.5 12.3 7.7L13.6 6.4C12.1 4.9 10.2 4 8 4S3.9 4.9 2.4 6.4L3.7 7.7C4.8 6.5 6.3 5.8 8 5.8Z"/>
        <circle cx="8" cy="10.5" r="1.8"/>
      </svg>
      <div class="battery">
        <span class="bat-pct" id="giftBatPct">76</span>
        <div class="bat-shell">
          <div class="bat-inner" id="giftBatInner"></div>
          <div class="bat-nub"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="gift-nav">
    <button class="gift-nav-back" id="giftBackBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M19 12H5M12 5l-7 7 7 7" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="gift-nav-info">
      <div class="gift-nav-title">礼物</div>
      <div class="gift-nav-sub">Gift · Collection</div>
    </div>
    <button class="gift-nav-add" id="giftAddBtn" title="添加礼物">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
        <line x1="8" y1="2" x2="8" y2="14" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="2" y1="8" x2="14" y2="8" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
  <div class="gift-tabs" id="giftTabs"></div>
  <div class="gift-scroll">
    <div class="gift-grid" id="giftGrid"></div>
    <div class="gift-empty" id="giftEmpty" style="display:none">暂无礼物</div>
  </div>
</div>

<!-- 添加礼物弹窗 -->
<div id="giftAddOverlay">
  <div class="gift-add-sheet" id="giftAddSheet">
    <div class="gift-add-handle"></div>
    <div class="gift-add-hd">
      <div class="gift-add-title">添加礼物</div>
      <button class="gift-add-close" id="giftAddClose">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
          <path d="M1 1l8 8M9 1L1 9" stroke="#666" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div class="gift-add-body">
      <div class="gift-add-label">礼物名称</div>
      <input class="gift-add-inp" id="giftInpName" placeholder="如：星光项链" />
      <div class="gift-add-label">描述</div>
      <input class="gift-add-inp" id="giftInpDesc" placeholder="一句话描述这份礼物" />
      <div class="gift-add-row">
        <input class="gift-add-inp" id="giftInpPrice" placeholder="价格（如：299）" style="flex:1"/>
        <input class="gift-add-inp" id="giftInpCat" placeholder="分类（如：饰品）" style="flex:1"/>
      </div>
      <div class="gift-add-label">快速选择分类</div>
      <div class="gift-cat-chips" id="giftCatChips"></div>
      <div class="gift-add-label">AI 生成</div>
      <div class="gift-ai-row">
        <button class="gift-ai-chip" id="giftAiRandBtn">
          <svg width="13" height="13" viewBox="0 0 20 20" fill="none">
            <path d="M10 1L11.8 7H18L12.9 10.7L14.7 16.7L10 13L5.3 16.7L7.1 10.7L2 7H8.2L10 1Z" stroke="#7a7a7a" stroke-width="1.3" stroke-linejoin="round"/>
          </svg>
          AI 随机生成
        </button>
        <button class="gift-ai-chip" id="giftAiIdeaBtn">
          <svg width="13" height="13" viewBox="0 0 20 20" fill="none">
            <circle cx="10" cy="10" r="8" stroke="#7a7a7a" stroke-width="1.3"/>
            <path d="M10 6v5l3 2" stroke="#7a7a7a" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          按思路生成
        </button>
      </div>
      <div class="gift-ai-status hidden" id="giftAiStatus">
        <div class="gift-spinner"></div>
        <span id="giftAiStatusTxt">AI 生成中…</span>
      </div>
      <input class="gift-add-inp" id="giftIdeaInp" placeholder="输入思路，如：适合夏天的小礼物" style="display:none"/>
    </div>
    <div class="gift-add-btn-row">
      <button class="gift-add-submit" id="giftAddSubmit">添加到礼物库</button>
    </div>
  </div>
</div>

<!-- 礼物详情弹窗 -->
<div id="giftDetailOverlay">
  <div class="gift-detail-sheet" id="giftDetailSheet">
    <div class="gift-add-handle"></div>
    <div class="gift-detail-art" id="giftDetailArt"></div>
    <div class="gift-detail-info">
      <div class="gift-detail-cat" id="giftDetailCat"></div>
      <div class="gift-detail-name" id="giftDetailName"></div>
      <div class="gift-detail-desc" id="giftDetailDesc"></div>
      <div class="gift-detail-price" id="giftDetailPrice"></div>
    </div>
    <div class="gift-detail-actions">
