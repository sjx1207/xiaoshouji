<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>记忆档案</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="memory.css"/>
</head>
<body>

<div class="mem-wrap">

  <!-- 状态栏 -->
  <div class="status-bar">
    <div class="status-time" id="statusTime">9:41</div>
    <div class="status-island" id="statusIsland"></div>
    <div class="status-right">
      <div class="signal"><i></i><i></i><i></i><i></i></div>
      <div class="battery">
        <span class="bat-pct" id="batPct">76</span>
        <div class="bat-shell">
          <div class="bat-inner" id="batInner"></div>
          <div class="bat-nub"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 头部 -->
  <div class="mem-header">

    <!-- 导航行 -->
    <div class="mem-nav-row">
      <button class="mem-back" onclick="goBack()">
        <svg viewBox="0 0 24 24" width="17" height="17" fill="none">
          <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="mem-nav-label">MEMORY ARCHIVE</div>
      <div style="width:36px"></div>
    </div>

    <!-- Hero 区 -->
    <div class="mem-hero">
      <div class="mem-hero-text">
        <div class="mem-hero-kicker">
          <span class="mem-kicker-dot"></span>
          PERSONA MEMORY
        </div>
        <h1 class="mem-hero-title">
          <span class="mem-hero-title-zh">记忆</span>
          <em class="mem-hero-title-it">档案</em>
        </h1>
        <p class="mem-hero-desc">角色记忆 · 关系 · 情绪状态</p>
      </div>
      <div class="mem-hero-card">
        <div class="mem-hero-card-inner">
          <div class="mem-hero-stat">
            <div class="mem-hero-stat-num" id="statTotal">00</div>
            <div class="mem-hero-stat-lbl">MEMORIES</div>
          </div>
          <div class="mem-hero-sep"></div>
          <div class="mem-hero-stat">
            <div class="mem-hero-stat-num" id="statChars">00</div>
            <div class="mem-hero-stat-lbl">PERSONAS</div>
          </div>
        </div>
        <div class="mem-hero-card-deco">AI · MEMORY</div>
      </div>
    </div>

    <!-- 分割带 -->
    <div class="mem-header-rule">
      <div class="mem-rule-line"></div>
      <div class="mem-rule-tag">COLLECTION</div>
      <div class="mem-rule-line"></div>
    </div>

    <!-- 角色筛选横条 -->
    <div class="mem-char-strip-wrap">
      <div class="mem-char-strip" id="memCharStrip">
        <!-- JS 渲染 -->
      </div>
    </div>

  </div><!-- /mem-header -->

  <!-- 卡片区 -->
  <div class="mem-body" id="memBody">
    <div class="mem-empty" id="memEmpty">
      <div class="mem-empty-icon">
        <svg viewBox="0 0 48 48" width="32" height="32" fill="none">
          <path d="M24 6a11 11 0 0 1 11 11c0 4-2.1 7.6-5.3 9.7l-1.1.7V31a3 3 0 0 1-3 3h-3a3 3 0 0 1-3-3v-3.6l-1.1-.7A11 11 0 0 1 24 6z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
          <path d="M19 31h10M20 35h8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="mem-empty-title" id="emptyTitle">暂无记忆档案</div>
      <div class="mem-empty-sub" id="emptySub">请先在角色档案中创建角色，<br>再为角色添加记忆</div>
    </div>
  </div>

  <!-- FAB -->
  <button class="mem-fab" id="memFab" onclick="openEditPanel(null)" style="display:none">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none">
      <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
    </svg>
  </button>

</div><!-- /mem-wrap -->


<!-- ======== 详情底板 ======== -->
<div class="mem-overlay" id="memOverlay" onclick="closeDetail()"></div>
<div class="mem-sheet" id="memDetailPanel">
  <div class="mem-sheet-handle"></div>
  <div class="mem-sheet-hd">
    <div>
      <div class="mem-sheet-eyebrow" id="detailCharName"></div>
      <div class="mem-sheet-title"   id="detailTitle"></div>
    </div>
    <button class="mem-sheet-close" onclick="closeDetail()">
      <svg viewBox="0 0 24 24" width="13" height="13" fill="none">
        <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
  <div class="mem-sheet-body" id="detailBody"></div>
  <div class="mem-sheet-foot">
    <button class="mem-foot-sec" onclick="editCurrentMemory()">编辑</button>
    <button class="mem-foot-del" onclick="deleteCurrentMemory()">删除</button>
  </div>
</div>


<!-- ======== 编辑底板 ======== -->
<div class="mem-overlay" id="editOverlay" onclick="closeEdit()"></div>
<div class="mem-sheet mem-edit-sheet" id="memEditPanel">
  <div class="mem-sheet-handle"></div>
  <div class="mem-sheet-hd">
    <div class="mem-sheet-title" id="editPanelTitle">新增记忆</div>
    <button class="mem-sheet-close" onclick="closeEdit()">
      <svg viewBox="0 0 24 24" width="13" height="13" fill="none">
        <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <div class="mem-form">
    <input type="hidden" id="editId"/>

    <!-- 所属角色 -->
    <div class="mem-field">
      <div class="mem-field-lbl">所属角色</div>
      <div class="mem-char-select" id="charSelectRow"></div>
    </div>

    <!-- 记忆标题 -->
    <div class="mem-field">
      <div class="mem-field-lbl">记忆标题</div>
      <input class="mem-input" id="editTitle" type="text" placeholder="一句话概括这段记忆"/>
    </div>

    <!-- 情感强度 -->
    <div class="mem-field">
      <div class="mem-field-lbl">
        情感强度
        <span class="mem-intensity-val" id="intensityVal">3</span>
      </div>
      <input class="mem-range" type="range" id="editIntensity" min="1" max="5" value="3"
             oninput="updateIntensity(this.value)"/>
    </div>

    <!-- 记忆内容 -->
    <div class="mem-field">
      <div class="mem-field-lbl">记忆内容</div>
      <textarea class="mem-textarea" id="editContent" rows="4" placeholder="描述这段记忆的具体情境与细节…"></textarea>
    </div>

    <!-- AI 提示词 -->
    <div class="mem-field">
      <div class="mem-field-lbl">AI 提示词片段</div>
      <textarea class="mem-textarea mem-mono" id="editPrompt" rows="3" placeholder="AI 扮演时直接注入的文本，如：你曾救过对方的命…"></textarea>
    </div>

    <!-- 关键词 -->
    <div class="mem-field">
      <div class="mem-field-lbl">关键词标签</div>
      <input class="mem-input" id="editTags" type="text" placeholder="空格分隔，如：重要 情感 过去"/>
    </div>

    <!-- 常驻 -->
    <div class="mem-field mem-field-row">
      <div>
        <div class="mem-field-lbl" style="margin:0">常驻激活</div>
        <div class="mem-field-hint">每次对话都会加载此记忆</div>
      </div>
      <div class="mem-toggle" id="alwaysToggle" data-on="false" onclick="toggleAlways()">
        <div class="mem-toggle-knob"></div>
      </div>
    </div>

    <button class="mem-save-btn" onclick="saveMemory()">保存记忆</button>
  </div>
</div>


<!-- ======== 删除确认 ======== -->
<div class="cv-confirm-overlay" id="confirmOverlay"></div>
<div class="cv-confirm" id="memConfirmPanel">
  <div class="cv-confirm-icon">
    <svg viewBox="0 0 24 24" width="28" height="28" fill="none">
      <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="cv-confirm-title">确认删除？</div>
  <div class="cv-confirm-desc">此操作无法撤销，记忆将被永久移除。</div>
  <div class="cv-confirm-actions">
    <button class="cv-confirm-cancel" onclick="cancelDelete()">取消</button>
    <button class="cv-confirm-ok"     onclick="confirmDelete()">删除</button>
  </div>
</div>

<script src="memory.js"></script>
</body>
</html>
