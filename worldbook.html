<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>世界书</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="worldbook.css"/>
</head>
<body>

<div class="wb-wrap">

  <!-- 状态栏 -->
  <div class="status-bar">
    <div class="status-time" id="statusTime">9:41</div>
    <div class="status-island" id="statusIsland"></div>
    <div class="status-right">
      <div class="signal"><i></i><i></i><i></i><i></i></div>
      <div class="battery">
        <span class="bat-pct" id="batPct">76</span>
        <div class="bat-shell">
          <div class="bat-inner" id="batInner"></div>
          <div class="bat-nub"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 头部 -->
  <div class="wb-header">
    <!-- 导航行 -->
    <div class="wb-nav-row">
      <button class="wb-back" onclick="goBack()">
        <svg viewBox="0 0 24 24" width="17" height="17" fill="none">
          <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="wb-nav-title">World Book</div>
      <button class="wb-add-btn" onclick="openNewEntry()">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none">
          <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <!-- Hero -->
    <div class="wb-hero">
      <!-- 装饰纹理 -->
      <div style="position:absolute;top:12px;right:18px;opacity:0.06;pointer-events:none;">
        <svg width="70" height="70" viewBox="0 0 70 70" fill="none">
          <circle cx="35" cy="35" r="32" stroke="#4a9fd4" stroke-width="1.5" stroke-dasharray="4 6"/>
          <circle cx="35" cy="35" r="20" stroke="#4a9fd4" stroke-width="1" stroke-dasharray="3 5"/>
          <circle cx="35" cy="35" r="8" fill="#4a9fd4"/>
        </svg>
      </div>

      <div class="wb-hero-top">
        <div>
          <div class="wb-hero-label">
            <div class="wb-hero-dot"></div>
            <div class="wb-hero-kicker">Lore · Design</div>
          </div>
          <div class="wb-hero-title">世界<em>书</em></div>
          <div class="wb-hero-desc">构建故事世界观<br>与背景设定</div>
        </div>
      </div>

      <div class="wb-stats">
        <div class="wb-stat-chip">
          <div class="wb-stat-num" id="statCount">00</div>
          <div class="wb-stat-lbl">Entries</div>
        </div>
        <div class="wb-stat-chip">
          <div class="wb-stat-num" id="statCats">00</div>
          <div class="wb-stat-lbl">Types</div>
        </div>
        <div class="wb-stat-chip">
          <div class="wb-stat-num" id="statEnabled">00</div>
          <div class="wb-stat-lbl">Active</div>
        </div>
      </div>
    </div>

    <!-- 搜索栏 -->
    <div class="wb-search-bar">
      <div class="wb-search-icon">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none">
          <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8"/>
          <path d="M20 20l-4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <input class="wb-search-input" id="wbSearch" type="text" placeholder="搜索条目名称或关键词…" oninput="onSearch(this.value)"/>
    </div>

    <!-- 分类筛选 -->
    <div class="wb-filter-row" id="wbFilterRow">
      <button class="wb-filter-btn active" data-cat="all" onclick="filterBy(this)">全部</button>
      <button class="wb-filter-btn" data-cat="地点" onclick="filterBy(this)">地点</button>
      <button class="wb-filter-btn" data-cat="势力" onclick="filterBy(this)">势力</button>
      <button class="wb-filter-btn" data-cat="事件" onclick="filterBy(this)">事件</button>
      <button class="wb-filter-btn" data-cat="规则" onclick="filterBy(this)">规则</button>
      <button class="wb-filter-btn" data-cat="其他" onclick="filterBy(this)">其他</button>
    </div>
  </div>

  <!-- 条目列表 -->
  <div class="wb-list" id="wbList"></div>

</div>

<!-- 遮罩 -->
<div class="wb-modal-overlay" id="wbModalOverlay" onclick="closeModal()"></div>

<!-- 编辑弹窗 -->
<div class="wb-modal" id="wbModal">
  <div class="wb-modal-handle"></div>
  <div class="wb-modal-header">
    <div>
      <div class="wb-modal-eyebrow">World Book</div>
      <div class="wb-modal-title" id="wbModalTitle">新建条目</div>
    </div>
    <button class="wb-modal-close" onclick="closeModal()">
      <svg viewBox="0 0 24 24" width="13" height="13" fill="none">
        <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <!-- 预览卡 -->
  <div class="wb-preview-zone">
    <div class="wb-preview-card" id="wbPreviewCard">
      <div class="wb-preview-bg" id="wbPreviewBg"></div>
      <div class="wb-preview-overlay"></div>
      <div class="wb-preview-content">
        <div class="wb-preview-cat" id="previewCat">地点</div>
        <div class="wb-preview-title" id="previewTitle">条目名称</div>
        <div class="wb-preview-sub" id="previewSub">简短描述</div>
      </div>
      <button class="wb-preview-bg-btn" onclick="document.getElementById('wbBgInput').click()">
        <svg viewBox="0 0 24 24" width="11" height="11" fill="none">
          <rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/>
          <path d="M3 15l5-4 4 3 3-3 6 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        更换背景
      </button>
      <input type="file" id="wbBgInput" accept="image/*" style="display:none" onchange="handleBgUpload(this)"/>
    </div>
  </div>

  <!-- 表单 -->
  <div class="wb-form">
    <!-- 名称 + 分类 -->
    <div class="wb-form-row">
      <div class="wb-form-group" style="flex:1.6">
        <label class="wb-form-label">
          <span class="wb-form-label-dot"></span>条目名称
        </label>
        <input class="wb-form-input" id="formTitle" type="text" placeholder="银月城"
          oninput="document.getElementById('previewTitle').textContent = this.value || '条目名称'"/>
      </div>
      <div class="wb-form-group">
        <label class="wb-form-label">
          <span class="wb-form-label-dot"></span>分类
        </label>
        <select class="wb-form-select" id="formCat" onchange="onCatChange(this)">
          <option value="地点">地点</option>
          <option value="势力">势力</option>
          <option value="事件">事件</option>
          <option value="规则">规则</option>
          <option value="其他">其他</option>
        </select>
      </div>
    </div>

    <!-- 简短描述 -->
    <div class="wb-form-group">
      <label class="wb-form-label">
        <span class="wb-form-label-dot"></span>简短描述
        <span class="wb-form-label-hint">显示在卡片上</span>
      </label>
      <input class="wb-form-input" id="formSub" type="text" placeholder="帝国边境的神秘港口城市"
        oninput="document.getElementById('previewSub').textContent = this.value || '简短描述'"/>
    </div>

    <!-- 关联角色 -->
    <div class="wb-form-group">
      <label class="wb-form-label">
        <span class="wb-form-label-dot"></span>关联角色
        <span class="wb-form-label-hint">选填 · 可多选</span>
      </label>
      <div class="wb-char-picker" id="wbCharPicker">
        <div class="wb-char-empty-hint">暂无角色，请先在角色档案中创建</div>
      </div>
    </div>

    <!-- 关键词 -->
    <div class="wb-form-group">
      <label class="wb-form-label">
        <span class="wb-form-label-dot"></span>触发关键词
        <span class="wb-form-label-hint">逗号分隔</span>
      </label>
      <input class="wb-form-input" id="formKeywords" type="text" placeholder="银月, 港口, 边境"/>
    </div>

    <!-- 详细设定 -->
    <div class="wb-form-group">
      <label class="wb-form-label">
        <span class="wb-form-label-dot"></span>详细设定
        <span class="wb-form-label-count" id="detailCount">0</span>
      </label>
      <textarea class="wb-form-textarea" id="formDetail"
        placeholder="在这里描述这个条目的完整世界观设定，历史背景、规则细节、氛围描述等..."
        oninput="document.getElementById('detailCount').textContent = this.value.length"></textarea>
    </div>

    <!-- 插入位置 -->
    <div class="wb-form-group">
      <label class="wb-form-label">
        <span class="wb-form-label-dot"></span>插入位置
      </label>
      <div class="wb-position-row">
        <button class="wb-pos-btn active" data-pos="before" onclick="selectPos(this)">对话前</button>
        <button class="wb-pos-btn" data-pos="after" onclick="selectPos(this)">对话后</button>
        <button class="wb-pos-btn" data-pos="system" onclick="selectPos(this)">系统层</button>
      </div>
    </div>

    <!-- 启用开关 -->
    <div class="wb-form-group wb-form-toggle-row">
      <div>
        <div class="wb-form-label" style="margin-bottom:2px">
          <span class="wb-form-label-dot"></span>启用此条目
        </div>
        <div style="font-size:11px;color:rgba(26,37,53,0.38);padding-left:0;margin-top:2px">关闭后不会注入到对话中</div>
      </div>
      <label class="wb-toggle">
        <input type="checkbox" id="formEnabled" checked/>
        <span class="wb-toggle-track"></span>
      </label>
    </div>
  </div>

  <!-- 底部按钮 -->
  <div class="wb-modal-footer">
    <button class="wb-btn-cancel" onclick="closeModal()">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none">
        <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      取消
    </button>
    <button class="wb-btn-save" onclick="saveEntry()">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none">
        <path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      保存条目
    </button>
  </div>
</div>

<!-- ================================
   详情页
================================ -->
<div class="wv-page" id="wvPage">

  <div class="wv-hero" id="wvHero">
    <div class="wv-hero-bg" id="wvHeroBg"></div>
    <div class="wv-hero-overlay"></div>

    <!-- 状态栏（详情页大图上） -->
    <div class="status-bar wv-status-bar">
      <div class="status-time" id="wvStatusTime">9:41</div>
      <div class="status-island" id="wvStatusIsland"></div>
      <div class="status-right">
        <div class="signal"><i></i><i></i><i></i><i></i></div>
        <div class="battery">
          <span class="bat-pct" id="wvBatPct">76</span>
          <div class="bat-shell">
            <div class="bat-inner" id="wvBatInner"></div>
            <div class="bat-nub"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="wv-topbar">
      <button class="wv-topbar-btn" onclick="closeView()">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none">
          <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="wv-topbar-label">World Entry</div>
      <button class="wv-topbar-btn" onclick="openMoreMenu()">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none">
          <circle cx="5" cy="12" r="1.5" fill="currentColor"/>
          <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
          <circle cx="19" cy="12" r="1.5" fill="currentColor"/>
        </svg>
      </button>
    </div>

    <div class="wv-hero-bottom">
      <div class="wv-cat-badge" id="wvCatBadge">地点</div>
      <div class="wv-hero-title" id="wvTitle">—</div>
      <div class="wv-hero-sub" id="wvSub">—</div>
      <div class="wv-status-pill" id="wvStatusPill">启用中</div>
    </div>
  </div>

  <!-- 详情内容 -->
  <div class="wv-body">

    <!-- 浮出信息卡 -->
    <div class="wv-info-float">
      <div class="wv-info-cell">
        <div class="wv-info-key">分类</div>
        <div class="wv-info-val" id="wvCat">—</div>
      </div>
      <div class="wv-info-cell">
        <div class="wv-info-key">位置</div>
        <div class="wv-info-val" id="wvPos">—</div>
      </div>
      <div class="wv-info-cell">
        <div class="wv-info-key">状态</div>
        <div class="wv-info-val" id="wvEnabled">启用</div>
      </div>
    </div>

    <!-- 关联角色 -->
    <div class="wv-section" id="wvCharsSection">
      <div class="wv-section-label">
        <span class="wv-section-bar"></span>
        Related Chars
      </div>
      <div class="wv-chars-row" id="wvCharsRow"></div>
    </div>

    <!-- 关键词 -->
    <div class="wv-section" id="wvKwSection">
      <div class="wv-section-label">
        <span class="wv-section-bar"></span>
        Keywords
      </div>
      <div class="wv-kw-row" id="wvKwRow"></div>
    </div>

    <!-- 详细设定 -->
    <div class="wv-section">
      <div class="wv-section-label">
        <span class="wv-section-bar"></span>
        Lore Detail
      </div>
      <div class="wv-detail-card">
        <span class="wv-detail-quote">"</span>
        <div class="wv-detail-text" id="wvDetail">—</div>
        <div class="wv-detail-rule"></div>
      </div>
    </div>

    <!-- 操作按钮 -->
    <div class="wv-actions">
      <button class="wv-act-apply" id="wvToggleBtn" onclick="toggleFromView()">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none">
          <path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        启用条目
      </button>
      <div class="wv-act-row">
        <button class="wv-act-edit" onclick="openEditFromView()">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          编辑
        </button>
        <button class="wv-act-delete" onclick="openDeleteConfirm()">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none">
            <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M10 11v6M14 11v6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          删除
        </button>
      </div>
    </div>

    <div style="height:50px"></div>
  </div>
</div>

<!-- 删除确认 -->
<div class="wv-confirm-overlay" id="wvConfirmOverlay"></div>
<div class="wv-confirm" id="wvConfirm">
  <div class="wv-confirm-icon">
    <svg viewBox="0 0 48 48" width="36" height="36" fill="none">
      <circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="1.5"/>
      <path d="M24 14v12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <circle cx="24" cy="32" r="1.5" fill="currentColor"/>
    </svg>
  </div>
  <div class="wv-confirm-title">确认删除</div>
  <div class="wv-confirm-desc">删除后无法恢复，该条目的所有设定将被清除。</div>
  <div class="wv-confirm-actions">
    <button class="wv-confirm-cancel" onclick="closeDeleteConfirm()">取消</button>
    <button class="wv-confirm-ok" onclick="confirmDelete()">确认删除</button>
  </div>
</div>

<script src="worldbook.js"></script>
</body>
</html>
