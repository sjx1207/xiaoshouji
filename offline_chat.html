<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Luna — 离线聊天</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="offline_chat.css" />
</head>
<body>

<div class="luna-wrap">
  <div class="luna-frame">

    <!-- 状态栏（一比一复刻） -->
    <div class="status-bar">
      <div class="status-time" id="offlineStatusTime">9:41</div>
      <div class="status-island" id="offlineStatusIsland"></div>
      <div class="status-right">
        <div class="signal"><i></i><i></i><i></i><i></i></div>
        <div class="battery">
          <span class="bat-pct" id="offlineBatPct">76</span>
          <div class="bat-shell">
            <div class="bat-inner" id="offlineBatInner"></div>
            <div class="bat-nub"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 聊天页 -->
    <div class="offline-page">

      <!-- HEADER（原版保留） -->
      <div class="hd">
        <div class="hd-deco"></div>
        <div class="hd-nav">
          <button class="hd-back" onclick="history.back()">
            <i class="ti ti-arrow-left" style="font-size:14px;color:#555;" aria-hidden="true"></i>
          </button>
          <div class="hd-nav-right">
            <button class="hd-act"><i class="ti ti-book" style="font-size:14px;" aria-hidden="true"></i></button>
            <button class="hd-act"><i class="ti ti-dots" style="font-size:14px;" aria-hidden="true"></i></button>
          </div>
        </div>
        <div class="hd-center">
          <div class="hd-av">
            <span class="hd-av-l">L</span>
            <div class="hd-av-ring"></div>
            <div class="hd-av-dot"></div>
          </div>
          <div class="hd-name">Luna</div>
          <div class="hd-en">The Watcher · 守夜者</div>
          <div class="hd-desc">永夜的守望，三百年的孤独</div>
          <div class="hd-badges">
            <span class="hd-badge on">在线</span>
            <span class="hd-badge">AI 角色</span>
            <span class="hd-badge">神秘</span>
          </div>
        </div>
        <div class="hd-bottom">
          <div class="hd-stat"><div class="hd-stat-v" id="convCount">247</div><div class="hd-stat-l">对话</div></div>
          <div class="hd-stat"><div class="hd-stat-v" id="daysCount">32d</div><div class="hd-stat-l">相识</div></div>
          <div class="hd-stat"><div class="hd-stat-v" id="floorNum">#1</div><div class="hd-stat-l">当前楼</div></div>
        </div>
        <div class="hd-scene-bar" id="sceneBar">
          <div class="hd-stag"><i class="ti ti-map-pin" aria-hidden="true"></i><span class="hd-stag-t">废弃图书馆</span></div>
          <div class="hd-stag"><i class="ti ti-moon" aria-hidden="true"></i><span class="hd-stag-t">深夜三时</span></div>
          <div class="hd-stag"><i class="ti ti-cloud" aria-hidden="true"></i><span class="hd-stag-t">寒雾 · 烛光</span></div>
          <div class="hd-stag fl" id="floorTag"><span class="hd-stag-t">楼 #1</span></div>
        </div>
      </div>

      <!-- 消息列表 -->
      <div class="msgs" id="msgList">
        <!-- 消息由 JS 动态渲染 -->
      </div>

      <!-- 输入区 v3 -->
      <div class="inp">

        <div class="inp-deco">
          <div class="inp-deco-line"></div>
          <span class="inp-deco-txt">narrate</span>
          <div class="inp-deco-line r"></div>
        </div>

        <div class="inp-box">
          <textarea class="inp-ta" id="inputText" placeholder="继续叙述……"></textarea>
        </div>

        <div class="inp-foot">
          <div class="inp-foot-left">
            <button class="icon-btn" title="重回" aria-label="重回">
              <i class="ti ti-rotate" aria-hidden="true"></i>
            </button>
            <div class="btn-sep"></div>
            <button class="icon-btn" title="提示" aria-label="提示">
              <i class="ti ti-bulb" aria-hidden="true"></i>
            </button>
            <div class="btn-sep"></div>
          </div>
          <div class="inp-foot-right">
            <span class="char-count" id="charCount">0</span>
            <button class="inp-send" id="sendBtn" aria-label="发送">
              <i class="ti ti-arrow-up" aria-hidden="true"></i>
            </button>
          </div>
        </div>

      </div>

    </div><!-- /.offline-page -->

  </div><!-- /.luna-frame -->
</div><!-- /.luna-wrap -->

<script src="offline_chat.js"></script>
</body>
</html>
