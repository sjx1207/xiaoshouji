<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Identity — Luna</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital@1&family=Fraunces:opsz,wght@9..144,100&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="user.css" />
</head>
<body>

<!-- 状态栏 — 完整同步 index/characters -->
<div class="status-bar" id="statusBar">
  <div class="status-time" id="statusTime">9:41</div>
  <div class="status-island" id="statusIsland"></div>
  <div class="status-right">
    <div class="signal">
      <i></i><i></i><i></i><i></i>
    </div>
    <div class="battery">
      <span class="bat-pct" id="batPct">76</span>
      <div class="bat-shell">
        <div class="bat-inner" id="batInner"></div>
        <div class="bat-nub"></div>
      </div>
    </div>
  </div>
</div>

<!-- 主体 -->
<div class="page-root">

  <!-- 顶部标题区 -->
  <div class="page-header">
    <button class="back-btn" onclick="goBack()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
    </button>
    <div class="header-title-block">
      <div class="header-eyebrow">LUNA SYSTEM</div>
      <h1 class="header-title">身份管理</h1>
    </div>
    <button class="add-btn" id="addBtn" onclick="openAddPanel()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
      <span>添加</span>
    </button>
  </div>

  <!-- 统计横条 -->
  <div class="stats-strip">
    <div class="stat-item">
      <div class="stat-num" id="statTotal">0</div>
      <div class="stat-label">总身份</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <div class="stat-num" id="statActive">0</div>
      <div class="stat-label">活跃</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <div class="stat-num" id="statRole">—</div>
      <div class="stat-label">主要角色</div>
    </div>
  </div>

  <!-- 卡片列表 -->
  <div class="cards-section">
    <div class="cards-grid" id="cardsGrid">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">
          <svg width="32" height="32" viewBox="0 0 48 48" fill="none">
            <rect x="8" y="14" width="32" height="22" rx="4" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="17" cy="24" r="4" stroke="currentColor" stroke-width="1.5"/>
            <line x1="25" y1="21" x2="36" y2="21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="25" y1="26" x2="33" y2="26" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="empty-title">暂无身份档案</div>
        <div class="empty-sub">点击右上角添加你的第一个身份</div>
      </div>
    </div>
  </div>

</div>

<!-- ========== 注册/编辑资料页（全屏覆盖，不是弹窗） ========== -->
<div class="profile-page" id="profilePage">

  <!-- 状态栏复刻 -->
  <div class="status-bar" id="profileStatusBar">
    <div class="status-time" id="profileStatusTime">9:41</div>
    <div class="status-island" id="profileStatusIsland"></div>
    <div class="status-right">
      <div class="signal"><i></i><i></i><i></i><i></i></div>
      <div class="battery">
        <span class="bat-pct" id="profileBatPct">76</span>
        <div class="bat-shell">
          <div class="bat-inner" id="profileBatInner"></div>
          <div class="bat-nub"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 顶部导航 -->
  <div class="profile-topnav">
    <button class="back-btn" onclick="closeProfilePage()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
    </button>
    <div class="header-title-block">
      <div class="header-eyebrow">LUNA SYSTEM</div>
      <h1 class="header-title" id="profilePageTitle">新建身份</h1>
    </div>
    <button class="add-btn" onclick="submitIdentity()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
      <span id="profileSaveBtnText">保存</span>
    </button>
  </div>

  <!-- 内容滚动区 -->
  <div class="profile-scroll">

    <!-- 头像大展示区 -->
    <div class="profile-hero">
      <div class="profile-hero-bg"></div>
      <div class="profile-avatar-wrap" onclick="triggerAvatarUpload()">
        <div class="profile-avatar-ring">
          <div class="profile-avatar" id="profileAvatarPreview" style="background:#1a1a22">
            <span id="profileAvatarLetter">A</span>
            <img id="profileAvatarImg" style="display:none;width:100%;height:100%;object-fit:contain;position:absolute;inset:0;border-radius:inherit;" alt=""/>
          </div>
        </div>
        <div class="profile-avatar-badge">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </div>
      </div>
      <input type="file" id="avatarFileInput" accept="image/*" style="display:none" onchange="handleAvatarUpload(event)"/>
      <div class="profile-hero-name" id="profileHeroName">— 未填写 —</div>
      <div class="profile-hero-role" id="profileHeroRole">角色 / 职位</div>
      <!-- 颜色选择 -->
      <div class="profile-color-row" id="profileColorChips">
        <div class="profile-color-chip selected" data-color="#1a1a22" style="background:#1a1a22" onclick="profileSelectColor(this)"></div>
        <div class="profile-color-chip" data-color="#2d2d3a" style="background:#2d2d3a" onclick="profileSelectColor(this)"></div>
        <div class="profile-color-chip" data-color="#3d3d4a" style="background:#3d3d4a" onclick="profileSelectColor(this)"></div>
        <div class="profile-color-chip" data-color="#555568" style="background:#555568" onclick="profileSelectColor(this)"></div>
        <div class="profile-color-chip" data-color="#7a7a8a" style="background:#7a7a8a" onclick="profileSelectColor(this)"></div>
        <div class="profile-color-chip" data-color="#a0a0b0" style="background:#a0a0b0" onclick="profileSelectColor(this)"></div>
        <div class="profile-color-chip" data-color="#c8c8d0" style="background:#c8c8d0" onclick="profileSelectColor(this)"></div>
        <div class="profile-color-chip chip-clear" onclick="clearProfileAvatarImage()">
          <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </div>
      </div>
    </div>

    <!-- 分区：基本信息 -->
    <div class="profile-section">
      <div class="profile-section-label">基本信息</div>

      <div class="profile-field-block">
        <div class="profile-field-item">
          <div class="profile-field-key">姓名 / 代号</div>
          <input class="profile-field-input" id="profileInputName" type="text" placeholder="输入姓名" maxlength="20"
            oninput="syncProfileHero()"/>
        </div>
        <div class="profile-field-divider"></div>
        <div class="profile-field-item">
          <div class="profile-field-key">角色 / 职位</div>
          <input class="profile-field-input" id="profileInputRole" type="text" placeholder="设计师、学生、创作者…" maxlength="30"
            oninput="syncProfileHero()"/>
        </div>
        <div class="profile-field-divider"></div>
        <div class="profile-field-item">
          <div class="profile-field-key">备注描述</div>
          <textarea class="profile-field-textarea" id="profileInputDesc" placeholder="关于这个身份的简短描述..." maxlength="100"></textarea>
        </div>
      </div>
    </div>

    <!-- 分区：账号信息（只读展示，由外部应用绑定同步） -->
    <div class="profile-section">
      <div class="profile-section-label">账号信息</div>
      <div class="profile-field-block">
        <div class="profile-field-item">
          <div class="profile-field-key">邮箱</div>
          <div class="profile-field-display" id="displayEmail">
            <span class="display-value" id="displayEmailVal">—</span>
            <span class="display-badge">邮箱 App 同步</span>
          </div>
        </div>
        <div class="profile-field-divider"></div>
        <div class="profile-field-item">
          <div class="profile-field-key">手机号</div>
          <div class="profile-field-display" id="displayPhone">
            <span class="display-value" id="displayPhoneVal">—</span>
            <span class="display-badge">钱包 App 同步</span>
          </div>
        </div>
        <div class="profile-field-divider"></div>
        <div class="profile-field-item">
          <div class="profile-field-key">密码管理</div>
          <div class="profile-field-display">
            <span class="display-value display-placeholder">暂无绑定账号</span>
            <span class="display-badge display-badge-lock">
              <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              待接入
            </span>
          </div>
        </div>
      </div>
    </div>

    <!-- 分区：身份标签 -->
    <div class="profile-section">
      <div class="profile-section-label">身份标签</div>
      <div class="profile-field-block">
        <div class="profile-field-item">
          <div class="profile-field-key">添加标签</div>
          <input class="profile-field-input" id="profileInputTag" type="text" placeholder="输入后按回车" maxlength="12"
            onkeydown="profileAddTagOnEnter(event)"/>
        </div>
        <div class="profile-tag-list" id="profileTagList"></div>
      </div>
    </div>

    <!-- 分区：绑定与状态 -->
    <div class="profile-section">
      <div class="profile-section-label">绑定与状态</div>
      <div class="profile-field-block">
        <div class="profile-field-item">
          <div class="profile-field-key">绑定 AI 角色</div>
          <div class="bind-select-wrap" id="profileBindSelectWrap">
            <div class="bind-select-btn profile-bind-btn" id="profileBindSelectBtn" onclick="toggleProfileBindDropdown()">
              <div class="bind-select-left">
                <div class="bind-select-avatar" id="profileBindSelectAvatar" style="background:#c8c8d0">?</div>
                <span id="profileBindSelectName">未绑定</span>
              </div>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="profileBindChevron">
                <polyline points="6 9 12 15 18 9"></polyline>
              </svg>
            </div>
            <div class="bind-dropdown" id="profileBindDropdown">
              <div class="bind-option bind-option-none selected" data-id="" onclick="profileSelectBoundChar(this)">
                <div class="bind-opt-avatar" style="background:#e8e8ec">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </div>
                <span>不绑定</span>
              </div>
            </div>
          </div>
        </div>
        <div class="profile-field-divider"></div>
        <div class="profile-field-item profile-field-row-inline">
          <div class="profile-field-key">激活状态</div>
          <div class="toggle-wrap">
            <input type="checkbox" id="profileToggleActive" class="toggle-input" checked/>
            <label for="profileToggleActive" class="toggle-track"></label>
          </div>
        </div>
      </div>
    </div>

    <!-- 档案编号展示区（编辑时显示） -->
    <div class="profile-id-strip" id="profileIdStrip" style="display:none">
      <div class="profile-id-label">ARCHIVE ID</div>
      <div class="profile-id-value" id="profileIdValue">—</div>
    </div>

    <!-- 底部保存按钮 -->
    <div class="profile-bottom-btn">
      <button class="profile-submit-btn" onclick="submitIdentity()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
        <span id="profileSubmitText">创建身份档案</span>
      </button>
    </div>

  </div><!-- /profile-scroll -->
</div><!-- /profile-page -->

<!-- ========== 卡片详情 — 全屏页面 ========== -->
<div class="detail-full-page" id="detailFullPage">

  <!-- 状态栏复刻 -->
  <div class="status-bar" id="detailStatusBar">
    <div class="status-time" id="detailStatusTime">9:41</div>
    <div class="status-island" id="detailStatusIsland"></div>
    <div class="status-right">
      <div class="signal"><i></i><i></i><i></i><i></i></div>
      <div class="battery">
        <span class="bat-pct" id="detailBatPct">76</span>
        <div class="bat-shell">
          <div class="bat-inner" id="detailBatInner"></div>
          <div class="bat-nub"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 顶部导航 -->
  <div class="profile-topnav">
    <button class="back-btn" onclick="closeDetailPage()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
    </button>
    <div class="header-title-block">
      <div class="header-eyebrow">LUNA SYSTEM</div>
      <h1 class="header-title" id="detailPageTitle">身份详情</h1>
    </div>
    <button class="add-btn" id="detailEditTopBtn" onclick="openEditFromDetail()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      <span>编辑</span>
    </button>
  </div>

  <!-- 详情滚动内容 -->
  <div class="profile-scroll">
    <div id="detailPageContent"></div>
  </div>
</div>

<script src="user.js"></script>
</body>
</html>
