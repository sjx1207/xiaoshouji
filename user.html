<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Identity — Luna</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital@1&family=Fraunces:opsz,wght@9..144,100&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="user.css" />
</head>
<body>

<!-- 状态栏（同步 index） -->
<div class="status-bar">
  <div class="status-time" id="statusTime">9:41</div>
  <div class="status-island" id="statusIsland"></div>
  <div class="status-right">
    <div class="signal">
      <i></i><i></i><i></i><i></i>
    </div>
    <div class="battery">
      <span class="bat-pct" id="batPct">76</span>
      <div class="bat-shell">
        <div class="bat-inner" id="batInner"></div>
        <div class="bat-nub"></div>
      </div>
    </div>
  </div>
</div>

<!-- 主体 -->
<div class="page-root">

  <!-- 顶部标题区 -->
  <div class="page-header">
    <button class="back-btn" onclick="history.back()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
    </button>
    <div class="header-title-block">
      <div class="header-eyebrow">LUNA SYSTEM</div>
      <h1 class="header-title">身份管理</h1>
    </div>
    <button class="add-btn" id="addBtn" onclick="openAddPanel()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
      <span>添加身份</span>
    </button>
  </div>

  <!-- 统计横条 -->
  <div class="stats-strip">
    <div class="stat-item">
      <div class="stat-num" id="statTotal">0</div>
      <div class="stat-label">总身份</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <div class="stat-num" id="statActive">0</div>
      <div class="stat-label">活跃</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <div class="stat-num" id="statRole">—</div>
      <div class="stat-label">主要角色</div>
    </div>
  </div>

  <!-- 卡片列表 -->
  <div class="cards-section">
    <div class="cards-grid" id="cardsGrid">
      <!-- 空状态 -->
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">
          <svg width="36" height="36" viewBox="0 0 48 48" fill="none">
            <rect x="8" y="14" width="32" height="22" rx="4" stroke="#c0c0cc" stroke-width="1.5"/>
            <circle cx="17" cy="24" r="4" stroke="#c0c0cc" stroke-width="1.5"/>
            <line x1="25" y1="21" x2="36" y2="21" stroke="#c0c0cc" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="25" y1="26" x2="33" y2="26" stroke="#c0c0cc" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="empty-title">暂无身份档案</div>
        <div class="empty-sub">点击右上角添加你的第一个身份</div>
      </div>
    </div>
  </div>

</div>

<!-- 添加身份面板 -->
<div class="panel-overlay" id="panelOverlay" onclick="closePanelCheck(event)"></div>
<div class="add-panel" id="addPanel">
  <div class="panel-handle"></div>

  <div class="panel-header">
    <div class="panel-title">新建身份档案</div>
    <button class="panel-close" onclick="closeAddPanel()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
  </div>

  <!-- 头像选择 -->
  <div class="field-group">
    <div class="field-label">头像缩写</div>
    <div class="avatar-presets" id="avatarPresets">
      <div class="avatar-chip selected" data-color="#1a1a1a" onclick="selectAvatarColor(this)"
        style="background:#1a1a1a;color:#fff">A</div>
      <div class="avatar-chip" data-color="#2d2d2d" onclick="selectAvatarColor(this)"
        style="background:#2d2d2d;color:#fff">B</div>
      <div class="avatar-chip" data-color="#4a4a4a" onclick="selectAvatarColor(this)"
        style="background:#4a4a4a;color:#fff">C</div>
      <div class="avatar-chip" data-color="#6b6b6b" onclick="selectAvatarColor(this)"
        style="background:#6b6b6b;color:#fff">D</div>
      <div class="avatar-chip" data-color="#8a8a8a" onclick="selectAvatarColor(this)"
        style="background:#8a8a8a;color:#fff">E</div>
    </div>
  </div>

  <!-- 姓名 -->
  <div class="field-group">
    <div class="field-label">姓名 / 代号</div>
    <input class="field-input" id="inputName" type="text" placeholder="输入姓名或昵称" maxlength="20"
      oninput="syncAvatarLetter(this.value)"/>
  </div>

  <!-- 角色 -->
  <div class="field-group">
    <div class="field-label">角色 / 职位</div>
    <input class="field-input" id="inputRole" type="text" placeholder="例如：设计师、学生、创作者" maxlength="30"/>
  </div>

  <!-- 标签 -->
  <div class="field-group">
    <div class="field-label">身份标签</div>
    <div class="tag-input-row">
      <input class="field-input tag-input" id="inputTag" type="text" placeholder="输入标签后按回车" maxlength="12"
        onkeydown="addTagOnEnter(event)"/>
    </div>
    <div class="tag-list" id="tagList"></div>
  </div>

  <!-- 描述 -->
  <div class="field-group">
    <div class="field-label">备注描述</div>
    <textarea class="field-textarea" id="inputDesc" placeholder="关于这个身份的简短描述..." maxlength="100"></textarea>
  </div>

  <!-- 状态 -->
  <div class="field-group field-row">
    <div class="field-label">激活状态</div>
    <div class="toggle-wrap">
      <input type="checkbox" id="toggleActive" class="toggle-input" checked/>
      <label for="toggleActive" class="toggle-track"></label>
    </div>
  </div>

  <button class="panel-submit" onclick="submitIdentity()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <polyline points="20 6 9 17 4 12"></polyline>
    </svg>
    创建身份
  </button>
</div>

<!-- 卡片详情面板 -->
<div class="detail-overlay" id="detailOverlay" onclick="closeDetail()"></div>
<div class="detail-panel" id="detailPanel">
  <div class="panel-handle"></div>
  <div class="detail-content" id="detailContent"></div>
</div>

<script src="user.js"></script>
</body>
</html>
