<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PhoneChar</title>
<link rel="stylesheet" href="phonechar.css">
</head>
<body>

  <!-- 背景光晕层 -->
  <div class="bg-glow"></div>
  <!-- 自定义壁纸层（图片 / 视频），置于最底层 -->
  <div class="wallpaper-layer" id="wallpaperLayer">
    <img id="wallpaperImg" class="wallpaper-media" alt="">
    <video id="wallpaperVideo" class="wallpaper-media" autoplay loop muted playsinline></video>
  </div>

  <!-- 状态栏 -->
  <div class="status-bar">
    <div class="status-time" id="time">09:41</div>
    <div class="status-right">
      <!-- 信号 -->
      <svg class="icon signal" viewBox="0 0 20 14" fill="none">
        <rect x="0" y="9" width="3" height="5" rx="0.8" fill="currentColor"/>
        <rect x="5.5" y="6.5" width="3" height="7.5" rx="0.8" fill="currentColor"/>
        <rect x="11" y="3.5" width="3" height="10.5" rx="0.8" fill="currentColor"/>
        <rect x="16.5" y="0" width="3" height="14" rx="0.8" fill="currentColor"/>
      </svg>
      <!-- 电池：宽度由 JS 按真实电量动态设置 -->
      <svg class="icon battery" viewBox="0 0 25 12" fill="none">
        <rect x="0.75" y="0.75" width="20.5" height="10.5" rx="2.75" stroke="currentColor" stroke-width="1"/>
        <rect id="batteryLevel" x="2.25" y="2.25" width="16" height="7.5" rx="1.5" fill="currentColor"/>
        <path d="M23 4.2V7.8C23.8 7.45 24.3 6.55 24.3 6C24.3 5.45 23.8 4.55 23 4.2Z" fill="currentColor" opacity="0.4"/>
      </svg>
    </div>
  </div>

  <!-- 编辑模式提示条 -->
  <div class="edit-banner" id="editBanner">
    <span>编辑模式已开启 · 点击图标或组件进行替换</span>
    <button type="button" id="editBannerClose">完成</button>
  </div>

  <!-- 壁纸编辑入口（仅编辑模式显示） -->
  <button type="button" class="wallpaper-edit-fab" id="wallpaperEditFab">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3.5" y="4.5" width="17" height="15" rx="2"/>
      <circle cx="8.5" cy="9.5" r="1.6"/>
      <path d="M4.5 16.5l4.7-4.8c.5-.5 1.3-.5 1.8 0l3.4 3.4 2-2c.5-.5 1.3-.5 1.8 0l1.8 1.9"/>
    </svg>
    <span>壁纸</span>
  </button>

  <!-- Home 面板：统一容器，纵向依次排列 头像组件 / App图标两行 / 第六七行(2x2图标+便签) -->
  <div class="home-panel">
    <div class="home-inner">

      <!-- 第一区块：头像 + 思考气泡（占三行高度，状态栏正下方） -->
      <div class="widget-slot">
        <div class="widget" data-widget-key="widget1">
          <div class="glass-plate">
            <img class="widget-bg-img" id="widget1BgImg" alt="">
          </div>
          <div class="corner-tl"></div>
          <div class="corner-br"></div>
          <div class="widget-edit-badge" data-edit-widget="widget1">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4.5l5 5L8 21H3v-5z"/></svg>
          </div>

          <div class="widget-content">
            <!-- 头像：纯 CSS 绘制，无真实图片 -->
            <div class="avatar-wrap">
              <div class="avatar-ring2"></div>
              <div class="avatar-ring"></div>
              <div class="avatar-circle">
                <div class="avatar-figure">
                  <div class="head"></div>
                  <div class="shoulders"></div>
                </div>
              </div>
              <div class="avatar-mark">✳</div>
            </div>

            <!-- 思考气泡：文案占位 -->
            <div class="bubble-col">
              <div class="cloud-bubble">
                <span class="qmark">"</span>
                <div class="text-placeholder">今天也要<br>好好生活呀</div>
                <div class="text-sub">Tap to edit</div>
              </div>
              <div class="star" style="top:-6px; right:16px;"></div>
              <div class="star sm" style="bottom:2px; right:32px;"></div>
              <div class="moon" style="top:-4px; left:18px;"></div>
            </div>
          </div>

          <div class="signature-row">
            <svg width="90" height="10" viewBox="0 0 90 10" class="deco-wave">
              <path d="M0 6 Q 22 -4 45 5 T 90 4" stroke="rgba(38,38,38,0.35)" stroke-width="1" fill="none"/>
            </svg>
            <div class="signature">
              Luna.
              <span class="en">Personal Widget</span>
            </div>
          </div>
        </div>
      </div>

      <!-- 第二区块：App 图标网格（第四五行，2行4列，共8个） -->
      <div class="app-grid">

        <!-- 第四行 -->
        <div class="app-item">
          <div class="app-icon" data-icon-key="icon1" data-icon-label="聊天">
            <span class="icon-svg-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 6.5C4 5.1 5.1 4 6.5 4h11C18.9 4 20 5.1 20 6.5v7c0 1.4-1.1 2.5-2.5 2.5H9l-4 4v-4H6.5C5.1 16 4 14.9 4 13.5z"/>
              <circle cx="8.5" cy="10" r="0.9" fill="currentColor" stroke="none"/>
              <circle cx="12" cy="10" r="0.9" fill="currentColor" stroke="none"/>
              <circle cx="15.5" cy="10" r="0.9" fill="currentColor" stroke="none"/>
            </svg>
          </span>
            <img class="icon-custom-img" alt=""></div>
          <span class="app-label">聊天</span>
        </div>

        <div class="app-item">
          <div class="app-icon" data-icon-key="icon2" data-icon-label="日记">
            <span class="icon-svg-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
              <rect x="5" y="4" width="14" height="16" rx="2"/>
              <path d="M8 4v3.2c0 .5.5.8.9.5L10.5 6.6 12 7.7l1.5-1.1 1.6 1.1c.4.3.9 0 .9-.5V4"/>
              <path d="M8.2 13h7.6M8.2 16h5"/>
            </svg>
          </span>
            <img class="icon-custom-img" alt=""></div>
          <span class="app-label">日记</span>
        </div>

        <div class="app-item">
          <div class="app-icon" data-icon-key="icon3" data-icon-label="相册">
            <span class="icon-svg-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
              <rect x="4.5" y="6.5" width="15" height="13" rx="2"/>
              <circle cx="9.2" cy="11" r="1.6"/>
              <path d="M5 18l4.2-4.3c.5-.5 1.3-.5 1.8 0L14 16.7l1.6-1.7c.5-.5 1.3-.5 1.8-.1L19.5 17"/>
            </svg>
          </span>
            <img class="icon-custom-img" alt=""></div>
          <span class="app-label">相册</span>
        </div>

        <div class="app-item">
          <div class="app-icon" data-icon-key="icon4" data-icon-label="音乐">
            <span class="icon-svg-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 17V6.5l9-2v10.5"/>
              <circle cx="7" cy="17" r="2"/>
              <circle cx="16" cy="15" r="2"/>
            </svg>
          </span>
            <img class="icon-custom-img" alt=""></div>
          <span class="app-label">音乐</span>
        </div>

        <!-- 第五行 -->
        <div class="app-item">
          <div class="app-icon" data-icon-key="icon5" data-icon-label="论坛">
            <span class="icon-svg-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 7.5C4 6.1 5.1 5 6.5 5H14c1.4 0 2.5 1.1 2.5 2.5v4c0 1.4-1.1 2.5-2.5 2.5H9l-3 3v-3H6.5C5.1 14 4 12.9 4 11.5z"/>
              <path d="M13 8.2h6.5c.8 0 1.5.7 1.5 1.5v3.5c0 .8-.7 1.5-1.5 1.5H19v2.3l-2.4-2.3"/>
            </svg>
          </span>
            <img class="icon-custom-img" alt=""></div>
          <span class="app-label">论坛</span>
        </div>

        <div class="app-item">
          <div class="app-icon" data-icon-key="icon6" data-icon-label="行程">
            <span class="icon-svg-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 4.5c-3.9 0-7 3.1-7 7 0 5 7 8 7 8s7-3 7-8c0-3.9-3.1-7-7-7z"/>
              <circle cx="12" cy="11" r="2.3"/>
            </svg>
          </span>
            <img class="icon-custom-img" alt=""></div>
          <span class="app-label">行程</span>
        </div>

        <div class="app-item">
          <div class="app-icon" data-icon-key="icon7" data-icon-label="钱包">
            <span class="icon-svg-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 8c0-1.1.9-2 2-2h11.5c1.4 0 2.5 1.1 2.5 2.5v7c0 1.4-1.1 2.5-2.5 2.5H6c-1.1 0-2-.9-2-2z"/>
              <path d="M4 8.3 13.5 6h4"/>
              <circle cx="16.2" cy="13" r="1.3"/>
            </svg>
          </span>
            <img class="icon-custom-img" alt=""></div>
          <span class="app-label">钱包</span>
        </div>

        <div class="app-item">
          <div class="app-icon" data-icon-key="icon8" data-icon-label="购物">
            <span class="icon-svg-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6.5 8.5h11l-1 11.5h-9z"/>
              <path d="M9 8.5V7a3 3 0 0 1 6 0v1.5"/>
            </svg>
          </span>
            <img class="icon-custom-img" alt=""></div>
          <span class="app-label">购物</span>
        </div>

      </div>

      <!-- 第三区块：第六七行 —— 左侧 2x2 图标（lunaplay/阅读/备忘录/邮箱），右侧便签组件 -->
      <div class="row-67">

        <div class="mini-icon-grid">
          <div class="app-item">
          <div class="app-icon" data-icon-key="icon9" data-icon-label="lunaplay">
            <span class="icon-svg-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="7.5"/>
                <path d="M10.3 9.2v5.6l4.8-2.8z" fill="currentColor" stroke="none"/>
              </svg>
            </span>
            <img class="icon-custom-img" alt=""></div>
            <span class="app-label">lunaplay</span>
          </div>

          <div class="app-item">
          <div class="app-icon" data-icon-key="icon10" data-icon-label="阅读">
            <span class="icon-svg-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 6.2c-1.3-1-3-1.5-5.2-1.2-.5.1-.8.5-.8 1v10.8c0 .6.5 1.1 1.1 1 2-.3 3.6.1 4.9 1.2 1.3-1.1 2.9-1.5 4.9-1.2.6.1 1.1-.4 1.1-1V6c0-.5-.3-.9-.8-1-2.2-.3-3.9.2-5.2 1.2z"/>
                <path d="M12 6.2v12.8"/>
              </svg>
            </span>
            <img class="icon-custom-img" alt=""></div>
            <span class="app-label">阅读</span>
          </div>

          <div class="app-item">
          <div class="app-icon" data-icon-key="icon11" data-icon-label="备忘录">
            <span class="icon-svg-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                <rect x="5.5" y="4" width="13" height="16" rx="2"/>
                <path d="M8.5 9h7M8.5 12.5l1.7 1.7L14.5 10"/>
              </svg>
            </span>
            <img class="icon-custom-img" alt=""></div>
            <span class="app-label">备忘录</span>
          </div>

          <div class="app-item">
          <div class="app-icon" data-icon-key="icon12" data-icon-label="邮箱">
            <span class="icon-svg-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                <rect x="4" y="6" width="16" height="12" rx="2"/>
                <path d="M4.5 7 12 13l7.5-6"/>
              </svg>
            </span>
            <img class="icon-custom-img" alt=""></div>
            <span class="app-label">邮箱</span>
          </div>
        </div>

        <div class="note-widget-slot">
          <div class="note-widget" data-widget-key="widget2">
            <div class="note-glass">
              <img class="widget-bg-img" id="widget2BgImg" alt="">
            </div>
            <div class="note-tape"></div>
            <div class="widget-edit-badge" data-edit-widget="widget2">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4.5l5 5L8 21H3v-5z"/></svg>
            </div>

            <div class="note-content">
              <span class="note-tag"><span class="dot"></span>Note</span>
              <div class="note-lines">
                <div class="line w-90"></div>
                <div class="line w-70"></div>
                <div class="line w-50"></div>
              </div>
            </div>

            <div class="note-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="rgba(38,38,38,0.5)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 4h10l4 4v12H5z"/>
                <path d="M15 4v4h4"/>
                <path d="M8 12h8M8 16h5"/>
              </svg>
            </div>
          </div>
        </div>

      </div>

    </div>
  </div>

  <!-- Dock 栏 -->
  <div class="dock">
    <div class="dock-item">
      <div class="dock-icon" data-icon-key="dock1" data-icon-label="dock 1">
        <span class="icon-svg-wrap">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M6.6 4.5c.6-.3 1.3-.1 1.7.5l1.4 2.2c.3.5.3 1.2-.1 1.7l-1.1 1.3c-.3.3-.3.8-.1 1.2 1 1.9 2.6 3.5 4.5 4.5.4.2.9.2 1.2-.1l1.3-1.1c.5-.4 1.2-.4 1.7-.1l2.2 1.4c.6.4.8 1.1.5 1.7l-.8 1.7c-.3.7-1 1.1-1.7 1.1-6.6-.2-12-5.6-12.2-12.2 0-.7.4-1.4 1.1-1.7z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round"/>
        </svg>
      </span>
        <img class="icon-custom-img" alt=""></div>
    </div>
    <div class="dock-item">
      <div class="dock-icon" data-icon-key="dock2" data-icon-label="dock 2">
        <span class="icon-svg-wrap">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M4.5 6.5c0-1.1.9-2 2-2h11c1.1 0 2 .9 2 2v9c0 1.1-.9 2-2 2H9l-4 3.5v-3.5h-.5c-1.1 0-2-.9-2-2z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
          <circle cx="9" cy="10.8" r="0.9" fill="currentColor" stroke="none"/>
          <circle cx="12.5" cy="10.8" r="0.9" fill="currentColor" stroke="none"/>
          <circle cx="16" cy="10.8" r="0.9" fill="currentColor" stroke="none"/>
        </svg>
      </span>
        <img class="icon-custom-img" alt=""></div>
    </div>
    <div class="dock-item">
      <div class="dock-icon" data-icon-key="dock3" data-icon-label="dock 3">
        <span class="icon-svg-wrap">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M4 10.5L12 4L20 10.5V19C20 19.5523 19.5523 20 19 20H15V14H9V20H5C4.44772 20 4 19.5523 4 19V10.5Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
        </svg>
      </span>
        <img class="icon-custom-img" alt=""></div>
    </div>
    <div class="dock-item">
      <div class="dock-icon" data-icon-key="dock4" data-icon-label="dock 4">
        <span class="icon-svg-wrap">
        <svg viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.4"/>
          <path d="M4 12h16M12 4c2.2 2.2 3.4 5 3.4 8s-1.2 5.8-3.4 8c-2.2-2.2-3.4-5-3.4-8s1.2-5.8 3.4-8z" stroke="currentColor" stroke-width="1.4"/>
        </svg>
      </span>
        <img class="icon-custom-img" alt=""></div>
    </div>
    <div class="dock-item" id="dockEditTrigger">
      <svg class="dock-progress-ring" viewBox="0 0 58 58">
        <circle cx="29" cy="29" r="26" stroke-dasharray="163.4" stroke-dashoffset="163.4" id="dockProgressCircle"/>
      </svg>
      <div class="dock-icon" data-icon-key="dock5" data-icon-label="dock 5">
        <span class="icon-svg-wrap">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M12 3.5l1.8 4.4 4.7.6-3.5 3.2 1 4.6L12 13.9l-4 2.4 1-4.6-3.5-3.2 4.7-.6z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
          <path d="M18.5 15.5l.6 1.5 1.5.6-1.5.6-.6 1.5-.6-1.5-1.5-.6 1.5-.6z" fill="currentColor" stroke="none"/>
        </svg>
      </span>
        <img class="icon-custom-img" alt=""></div>
    </div>
  </div>
  <!-- 提示：长按上方最后一个 dock 图标（星星）0.6 秒可进入编辑模式 -->

  <!-- 通用编辑面板：壁纸 / 图标 / 组件背景 共用一套弹层结构 -->
  <div class="edit-overlay" id="editOverlay">
    <div class="edit-sheet" id="editSheet">
      <div class="edit-sheet-handle"></div>

      <div class="edit-sheet-header">
        <h3 id="editSheetTitle">替换图片</h3>
        <button type="button" class="edit-sheet-close" id="editSheetClose" aria-label="关闭">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
      </div>

      <!-- 媒体类型切换（仅壁纸场景显示：图片 / 视频） -->
      <div class="edit-type-switch" id="editTypeSwitch">
        <button type="button" class="type-btn is-active" data-media-type="image">图片</button>
        <button type="button" class="type-btn" data-media-type="video">视频</button>
      </div>

      <!-- 预览区 -->
      <div class="edit-preview" id="editPreview">
        <div class="edit-preview-empty" id="editPreviewEmpty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3.5" y="4.5" width="17" height="15" rx="2"/>
            <circle cx="8.5" cy="9.5" r="1.6"/>
            <path d="M4.5 16.5l4.7-4.8c.5-.5 1.3-.5 1.8 0l3.4 3.4 2-2c.5-.5 1.3-.5 1.8 0l1.8 1.9"/>
          </svg>
          <span>暂无预览</span>
        </div>
        <img class="edit-preview-img" id="editPreviewImg" alt="预览">
        <video class="edit-preview-video" id="editPreviewVideo" muted loop autoplay playsinline></video>
      </div>

      <!-- 上传控制区 -->
      <label class="edit-upload-zone" id="editUploadZone" for="editFileInput">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 16V4M12 4l-4 4M12 4l4 4"/>
          <path d="M4 16v2.5c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V16"/>
        </svg>
        <span id="editUploadLabel">点击选择图片，或拖拽到此处</span>
        <input type="file" id="editFileInput" accept="image/*" hidden>
      </label>

      <p class="edit-hint" id="editHint">支持透明背景 PNG，将按组件形状自动裁切显示</p>

      <div class="edit-sheet-actions">
        <button type="button" class="edit-btn ghost" id="editResetBtn">恢复默认</button>
        <button type="button" class="edit-btn primary" id="editConfirmBtn">应用</button>
      </div>
    </div>
  </div>

<script src="phonechar.js"></script>
</body>
</html>
