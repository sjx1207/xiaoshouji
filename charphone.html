<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>存放处</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Space+Mono:wght@400;700&family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="charphone.css"/>
</head>
<body>

<div class="cp-wrap">

  <!-- 状态栏 — 完整同步 index -->
  <div class="status-bar">
    <div class="status-time" id="statusTime">9:41</div>
    <div class="status-island" id="statusIsland"></div>
    <div class="status-right">
      <div class="signal"><i></i><i></i><i></i><i></i></div>
      <div class="battery">
        <span class="bat-pct" id="batPct">76</span>
        <div class="bat-shell">
          <div class="bat-inner" id="batInner"></div>
          <div class="bat-nub"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ========== 头部 ========== -->
  <div class="cp-header">

    <!-- 装饰刻度层 -->
    <div class="cp-header-deco">
      <span class="hd-tick hd-tick--v"></span>
      <span class="hd-tick hd-tick--h"></span>
      <span class="hd-dot"></span>
      <span class="hd-ring-sm"></span>
      <span class="hd-label">ARCHIVE</span>
    </div>

    <!-- 导航行 -->
    <div class="cp-nav-row">
      <button class="cp-back" onclick="goBack()">
        <svg viewBox="0 0 24 24" width="17" height="17" fill="none">
          <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="cp-nav-label">设备档案室</div>
      <span class="cp-nav-spacer"></span>
    </div>

    <!-- 主 Hero 区 -->
    <div class="cp-hero">
      <div class="cp-hero-kicker">
        <span class="cp-kicker-dot"></span>
        选择 · 一台 · 设备
      </div>
      <h1 class="cp-hero-title">
        <span class="cp-hero-title-en">谁的</span>
        <em class="cp-hero-title-it">手机</em>
      </h1>
      <p class="cp-hero-desc">在指尖触碰屏幕、解开锁屏之前<br>那些记录都还安静地沉睡着</p>
      <div class="cp-hero-tags">
        <span class="cp-hero-tag">静置 · 收藏</span>
        <span class="cp-hero-tag">逐一 · 唤醒</span>
      </div>
    </div>

    <!-- 装饰分割带 -->
    <div class="cp-header-rule">
      <div class="cp-rule-line"></div>
      <div class="cp-rule-tag" id="cpCount">00 · 台设备</div>
      <div class="cp-rule-line"></div>
    </div>

  </div>

  <!-- ========== 手机陈列区 ========== -->
  <div class="cp-gallery" id="cpGallery" role="list">
    <!-- JS 动态渲染 -->
  </div>

  <div style="height:50px"></div>
</div>

<script src="charphone.js"></script>
</body>
</html>
