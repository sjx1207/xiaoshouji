<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>视频记录 · Video Log</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="videolog.css" data-videolog-css="1" />
</head>
<body class="vl-page-body">

<!-- ═══ 状态栏：与 chatroom / videocall 同步复刻，保证跨页体验连贯 ═══ -->
<div class="vl-status-bar">
  <div class="vl-status-time" id="vlTime">9:41</div>
  <div class="vl-status-island" id="vlIsland"></div>
  <div class="vl-status-right">
    <div class="vl-signal"><i></i><i></i><i></i><i></i></div>
    <svg width="15" height="11" viewBox="0 0 16 12" fill="#161616" opacity="0.82">
      <path d="M8 2.5C10.3 2.5 12.4 3.5 13.9 5.1L15.2 3.8C13.3 1.9 10.8.8 8 .8S2.7 1.9.8 3.8L2.1 5.1C3.6 3.5 5.7 2.5 8 2.5Z"/>
      <path d="M8 5.8C9.7 5.8 11.2 6.5 12.3 7.7L13.6 6.4C12.1 4.9 10.2 4 8 4S3.9 4.9 2.4 6.4L3.7 7.7C4.8 6.5 6.3 5.8 8 5.8Z"/>
      <circle cx="8" cy="10.5" r="1.8"/>
    </svg>
    <div class="vl-battery">
      <span class="vl-bat-pct" id="vlBatPct">76</span>
      <div class="vl-bat-shell">
        <div class="vl-bat-inner" id="vlBatInner"></div>
        <div class="vl-bat-nub"></div>
      </div>
    </div>
  </div>
</div>

<div class="vl-page-wrap">

  <div class="vl-deco-arc"></div>

  <!-- ═══ 列表屏：这个角色名下所有通话记录 ═══ -->
  <div id="vlListScreen">

    <div class="vl-page-eyebrow">
      <span class="vl-back-arrow" onclick="history.length > 1 ? history.back() : (location.href = 'chatroom.html')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </span>
      <span>VIDEO LOG · 通话记录</span>
    </div>

    <h1 class="vl-page-title">与 <span id="vlCharName">Luna</span> 的<br/>视频记录</h1>
    <p class="vl-page-sub">这里存着你们每一通视频电话的完整转录，点开任意一条查看当时都聊了什么。</p>

    <div class="vl-section-rule">
      <span class="vl-rule-label">ALL CALLS</span>
      <span class="vl-rule-line"></span>
    </div>

    <div id="vlList">
      <div class="vl-detail-loading">加载中…</div>
    </div>

  </div><!-- /vlListScreen -->

  <!-- ═══ 详情屏：某一条通话的完整转录 ═══ -->
  <div id="vlDetailScreen" class="vl-screen-hidden">

    <button class="vl-back-btn" id="vlBackBtn" type="button">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      返回记录列表
    </button>

    <div class="vl-detail-screen-card">
      <div id="vlDetailContent">
        <div class="vl-detail-loading">加载中…</div>
      </div>
    </div>

  </div><!-- /vlDetailScreen -->

</div><!-- /vl-page-wrap -->

<script src="videolog.js"></script>
</body>
</html>
